      // 通常敵：丸っこいスライム鬼（赤・ぷるんとした体＋陰影）
      var ew=e.w, eh=e.h;
      ctx.lineJoin='round';
      var bodyP=function(){
        ctx.beginPath();
        ctx.moveTo(0,-eh+bob);
        ctx.quadraticCurveTo(-ew*0.62,-eh*0.85+bob,-ew*0.55,-eh*0.35+bob);
        ctx.quadraticCurveTo(-ew*0.5,bob+2,0,bob+2);
        ctx.quadraticCurveTo(ew*0.5,bob+2,ew*0.55,-eh*0.35+bob);
        ctx.quadraticCurveTo(ew*0.62,-eh*0.85+bob,0,-eh+bob);
        ctx.closePath();
      };
      ctx.strokeStyle='#3a0a08';ctx.lineWidth=2.4;bodyP();ctx.stroke();
      var fg=ctx.createRadialGradient(-ew*0.15,-eh*0.6+bob,2,0,-eh*0.4+bob,ew*0.7);
      fg.addColorStop(0,'#e25548');fg.addColorStop(1,'#a82018');
      ctx.fillStyle=fg;bodyP();ctx.fill();
      // ツノ
      ctx.fillStyle='#882018';ctx.strokeStyle='#3a0a08';ctx.lineWidth=1.6;
      ctx.beginPath();ctx.moveTo(-ew*0.3,-eh*0.85+bob);ctx.lineTo(-ew*0.42,-eh*1.15+bob);ctx.lineTo(-ew*0.15,-eh*0.92+bob);ctx.closePath();ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.moveTo(ew*0.3,-eh*0.85+bob);ctx.lineTo(ew*0.42,-eh*1.15+bob);ctx.lineTo(ew*0.15,-eh*0.92+bob);ctx.closePath();ctx.fill();ctx.stroke();
      // ハイライト（ぷるん）
      ctx.fillStyle='rgba(255,255,255,0.25)';
      ctx.beginPath();ctxEllipse(ctx,-ew*0.2,-eh*0.6+bob,ew*0.15,eh*0.12,-0.3,0,Math.PI*2);ctx.fill();
      // 目（大きめ・つぶら）
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(-ew*0.2,-eh*0.5+bob,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc( ew*0.2,-eh*0.5+bob,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#1a1a1a';
      ctx.beginPath();ctx.arc(-ew*0.18,-eh*0.48+bob,1.6,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc( ew*0.22,-eh*0.48+bob,1.6,0,Math.PI*2);ctx.fill();
      // 口（への字＋牙）
      ctx.strokeStyle='#3a0a08';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(-ew*0.18,-eh*0.22+bob);ctx.quadraticCurveTo(0,-eh*0.3+bob,ew*0.18,-eh*0.22+bob);ctx.stroke();
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.moveTo(-ew*0.1,-eh*0.24+bob);ctx.lineTo(-ew*0.05,-eh*0.12+bob);ctx.lineTo(-ew*0.16,-eh*0.18+bob);ctx.fill();
    }
    // HP表示
    if(e.maxHp>1){
      for(var hi=0;hi<e.maxHp;hi++){
        ctx.fillStyle=hi<e.hp?'#2ecc71':'#333';
        ctx.fillRect(-e.w/2+hi*(e.w/e.maxHp)+1,-e.h-8+bob,e.w/e.maxHp-2,3);
      }
    }
    ctx.restore();
  }

  // 爆弾・爆発描画（防御不可）
  for(var boi=0;boi<bombs.length;boi++){
    var bo=bombs[boi];
    var bx=bo.x-cam;
    ctx.save();
    if(bo.exploded){
      var exR=40*(bo.exTimer/20);
      ctx.globalAlpha=Math.max(0,1-bo.exTimer/20);
      ctx.fillStyle='#ff6600';
      ctx.shadowColor='#ff6600';ctx.shadowBlur=20;
      ctx.beginPath();ctx.arc(bx,bo.y,exR,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffcc00';
      ctx.beginPath();ctx.arc(bx,bo.y,exR*0.6,0,Math.PI*2);ctx.fill();
      if(bo.exTimer<8){
        ctx.globalAlpha=0.9;ctx.shadowBlur=0;ctx.fillStyle='#fff';
        ctx.font='bold 11px monospace';ctx.textAlign='center';
        ctx.fillText('NO GUARD!',bx,bo.y-exR-5);
      }
    } else {
      ctx.fillStyle='#2c3e50';
      ctx.beginPath();ctx.arc(bx,bo.y,bo.r,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#f39c12';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(bx,bo.y-bo.r);ctx.lineTo(bx+4,bo.y-bo.r-6);ctx.stroke();
      ctx.fillStyle='#ffe44d';
      ctx.beginPath();ctx.arc(bx+4,bo.y-bo.r-6,2,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }

  // パーティクル（グロー発光付き）
  for(var qi=0;qi<ptcl.length;qi++){
    var q=ptcl[qi];
    var qa=q.life/q.ml;
    ctx.save();
    ctx.globalAlpha=qa;
    ctx.fillStyle=q.col;
    ctx.shadowColor=q.col;
    ctx.shadowBlur=8*qa;
    ctx.beginPath();ctx.arc(q.x-cam,q.y,q.r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // ドロップアイテム（ハート）描画
  for(var iti=0;iti<items.length;iti++){
    var itd=items[iti];
    var bob=itd.onG?Math.sin(fr*0.1+iti)*3:0;
    var blink=itd.life<120 && Math.floor(itd.life/6)%2===0; // 消滅前点滅
    if(blink) continue;
    ctx.save();
    ctx.shadowColor='#ff4466'; ctx.shadowBlur=10;
    ctx.font='16px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('❤',itd.x-cam,itd.y+bob);
    ctx.restore();
  }

  // スコアポップ（撃破時に+100等がふわっと浮く）
  for(var pi2=0;pi2<pops.length;pi2++){
    var po=pops[pi2];
    var pa=Math.min(1,po.life/(po.ml*0.4));
    ctx.save();
    ctx.globalAlpha=pa;
    ctx.font='bold 13px Arial';
    ctx.textAlign='center';
    ctx.lineWidth=3;ctx.strokeStyle='rgba(0,0,0,0.6)';
    ctx.strokeText(po.txt,po.x-cam,po.y);
    ctx.fillStyle=po.col;
    ctx.fillText(po.txt,po.x-cam,po.y);
    ctx.restore();
  }

  // 弾（火・レーザー）
  for(var bi=0;bi<bullets.length;bi++){
    var b=bullets[bi];
    var bx=b.x-cam;
    ctx.save();
    if(b.type==='fire'){
      // 火の玉：オレンジ＋グロー
      ctx.globalAlpha=0.9;
      ctx.fillStyle='#ff6600';
      ctx.shadowColor='#ff4400';ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(bx,b.y,b.r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffcc00';
      ctx.beginPath();ctx.arc(bx,b.y,b.r*0.5,0,Math.PI*2);ctx.fill();
    } else {
      // レーザー：青白い線
      ctx.globalAlpha=0.95;
      ctx.strokeStyle='#00eeff';ctx.lineWidth=3;
      ctx.shadowColor='#00eeff';ctx.shadowBlur=12;
      ctx.beginPath();ctx.moveTo(bx-8*Math.sign(b.vx),b.y);ctx.lineTo(bx+8*Math.sign(b.vx),b.y);ctx.stroke();
      ctx.fillStyle='#ffffff';
      ctx.beginPath();ctx.arc(bx,b.y,b.r,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }

  // 棒人間（プレイ中・各種ゲーム状態のみ。タイトル/キャラ選択中は描かない）
  if(gs!=='title' && gs!=='charSelect' && p.skillLv!==undefined){
  // プレイヤーの影（地面に落ちる楕円・接地感）
  (function(){
    var shX=(p.x+pw()/2)-cam;
    var groundBelow=getGroundY(p.x+pw()/2);
    if(groundBelow<GROUND+10){
      var dist=Math.max(0,groundBelow-(p.y+ph()));
      var shScale=Math.max(0.3,1-dist/200);
      ctx.save();
      ctx.globalAlpha=0.25*shScale;
      ctx.fillStyle='#000';
      ctxEllipse(ctx,shX,groundBelow-2,pw()*0.55*shScale,4*shScale,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  })();

  // スカッシュ＆ストレッチ（ジャンプで縦伸び・着地で縦潰れ）
  var sq=p.squash||0;
  var scaleX=1-sq*0.25, scaleY=1+sq*0.3;
  if(sq!==0){
    ctx.save();
    var feetX=(p.x+pw()/2)-cam, feetY=p.y+ph();
    ctx.translate(feetX,feetY);
    ctx.scale(scaleX,scaleY);
    ctx.translate(-feetX,-feetY);
    drawStick(feetX,feetY,p.dir,p.st,p.af,p.ifrm,p.skillLv,p.atkT,gG());
    ctx.restore();
  } else {
    // 接地ソフトシャドウ（空中では小さく薄く＝高さが伝わる）
    var pgY=getGroundY(p.x+pw()/2);
    if(pgY<H+40){
      var airH=Math.max(0,pgY-(p.y+ph()));
      var shSc=Math.max(0.35,1-airH/130);
      ctx.save();
      ctx.globalAlpha=0.28*shSc;
      ctx.fillStyle='#000';
      ctx.beginPath();
      ctxEllipse(ctx,(p.x+pw()/2)-cam,pgY-2,12*shSc,3.5*shSc,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    drawStick((p.x+pw()/2)-cam,p.y+ph(),p.dir,p.st,p.af,p.ifrm,p.skillLv,p.atkT,gG());
  }
  } // end プレイヤー描画ガード

  // ── 防御成功エフェクト ──
  if(p.guardEffect>0){
    var gx=(p.x+pw()/2)-cam;
    var gy=p.y+8;
    var alpha=p.guardEffect/30;
    var scale=1+(1-alpha)*0.4; // 少し拡大しながら消える
    ctx.save();
    ctx.globalAlpha=alpha;
    // 盾の輝きリング
    ctx.strokeStyle='#aaddff';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(gx, gy, 22*scale, 0, Math.PI*2);
    ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.7)';
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.arc(gx, gy, 16*scale, 0, Math.PI*2);
    ctx.stroke();
    // GUARD! テキスト
    ctx.fillStyle='#aaddff';
    ctx.font='bold 11px Arial Black,sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='bottom';
    ctx.shadowColor='#00aaff';
    ctx.shadowBlur=8;
    ctx.fillText('GUARD!', gx, gy-26-p.guardEffect*0.3);
    ctx.shadowBlur=0;
    ctx.restore();
  }

  // ボス撃破後：ゴールへ誘導バナー
  if(bossClearMsg>0){
    ctx.save();
    var ba=Math.min(1,bossClearMsg/30);
    ctx.globalAlpha=ba;
    ctx.fillStyle='#ffe44d';
    ctx.font='bold 22px Arial Black,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='#ff8800';ctx.shadowBlur=14;
    ctx.fillText('BOSS DEFEATED!', W/2, H*0.34);
    ctx.font='bold 13px Arial,sans-serif';
    ctx.fillStyle='#fff';
    ctx.fillText('→ ゴールへ走れ！', W/2, H*0.44);
    ctx.shadowBlur=0;
    ctx.restore();
  }

  // 無敵シールドエフェクト（金色点滅オーラ）
  if(p.skillLv>=5 && p.invTimer>0){
    var gx2=(p.x+pw()/2)-cam, gy2=p.y+ph()/2;
    ctx.save();
    ctx.globalAlpha=(0.3+Math.sin(fr*0.3)*0.2);
    ctx.strokeStyle='#ffe44d'; ctx.lineWidth=4;
    ctx.shadowColor='#ffe44d'; ctx.shadowBlur=20;
    ctx.beginPath(); ctx.arc(gx2,gy2,32,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=0.08;
    ctx.fillStyle='#ffe44d';
    ctx.beginPath(); ctx.arc(gx2,gy2,32,0,Math.PI*2); ctx.fill();
    // 残り時間表示
    ctx.globalAlpha=0.9; ctx.fillStyle='#ffe44d';
    ctx.font='bold 9px monospace'; ctx.textAlign='center';
    ctx.fillText(Math.ceil(p.invTimer/60)+'s', gx2, gy2-38);
    ctx.restore();
  }


  // 巨大レーザー発射エフェクト
  if(p.megaLaserActive){
    var ly=p.y+ph()*0.35;
    var lx=(p.x+pw()/2)-cam;
    var lEndX=p.dir>0?W+50:-50;
    ctx.save();
    ctx.globalAlpha=0.9;
    // コア
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=6;
    ctx.shadowColor='#00eeff'; ctx.shadowBlur=30;
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lEndX,ly); ctx.stroke();
    // グロー
    ctx.strokeStyle='#00eeff'; ctx.lineWidth=18;
    ctx.globalAlpha=0.35;
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lEndX,ly); ctx.stroke();
    // 外縁
    ctx.strokeStyle='#aaeeff'; ctx.lineWidth=2;
    ctx.globalAlpha=0.7;
    ctx.beginPath(); ctx.moveTo(lx,ly-9); ctx.lineTo(lEndX,ly-9); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lx,ly+9); ctx.lineTo(lEndX,ly+9); ctx.stroke();
    ctx.restore();
  }

  // 防御エフェクト
  if(gG()&&gs==='play'&&p.skillLv>=1){
    var gx=(p.x+pw()/2)-cam, gy=p.y+ph()/2;
    if(p.skillLv>=5&&p.invTimer>0){
      // 無敵モード：バリア（緑の輪）
      ctx.save();
      ctx.globalAlpha=0.35+Math.sin(fr*0.2)*0.15;
      ctx.strokeStyle='#50dc78'; ctx.lineWidth=3;
      ctx.shadowColor='#50dc78'; ctx.shadowBlur=15;
      ctx.beginPath();ctx.arc(gx,gy,28,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=0.08; ctx.fillStyle='#50dc78';
      ctx.beginPath();ctx.arc(gx,gy,28,0,Math.PI*2);ctx.fill();
      ctx.restore();
    } else {
      // 盾構えエフェクト：盾の周囲に小さな火花
      ctx.save();
      ctx.globalAlpha=0.7;
      for(var si2=0;si2<4;si2++){
        var sa=fr*0.15+si2*Math.PI/2;
        var sr=18;
        ctx.fillStyle='#88aaff';
        ctx.beginPath();ctx.arc(gx+Math.cos(sa)*sr,gy+Math.sin(sa)*sr,2,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    }
  }

  // 被ダメ赤フラッシュ（画面端ビネット）
  if(dmgFlash>0){
    dmgFlash--;
    var fa=(dmgFlash/16)*0.4;
    var vg=ctx.createRadialGradient(W/2,H/2,H*0.35,W/2,H/2,H*0.75);
    vg.addColorStop(0,'rgba(255,0,0,0)');
    vg.addColorStop(1,'rgba(255,30,30,'+fa.toFixed(3)+')');
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  }

  // コンボカウンター（2連続以上で画面上部に表示）
  if(combo>=2 && gs==='play'){
    var cps=1+Math.min(0.3,(comboT>220?(comboT-220)*0.02:0)); // 加算直後パルス
    ctx.save();
    ctx.translate(W/2,34); ctx.scale(cps,cps);
    ctx.font='bold 17px Arial'; ctx.textAlign='center';
    ctx.lineWidth=4; ctx.strokeStyle='rgba(0,0,0,0.65)';
    ctx.strokeText('×'+combo+' COMBO!',0,0);
    ctx.fillStyle=combo>=5?'#ff44ff':'#ffe44d';
    ctx.fillText('×'+combo+' COMBO!',0,0);
    // 残り時間バー
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(-40,6,80,4);
    ctx.fillStyle=combo>=5?'#ff44ff':'#ffe44d';
    ctx.fillRect(-40,6,80*(comboT/240),4);
    ctx.restore();
  }

  // ポーズ画面
  if(gs==='paused'){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.font='bold 26px Arial'; ctx.textAlign='center';
    ctx.fillText('⏸ PAUSED',W/2,H/2-10);
    ctx.font='13px Arial'; ctx.fillStyle='#ccc';
    ctx.fillText('画面タップで再開',W/2,H/2+18);
    ctx.restore();
  }

  // スキャンライン
  ctx.fillStyle='rgba(0,0,0,.03)';
  for(var y=0;y<H;y+=4)ctx.fillRect(0,y,W,1);

  ctx.restore(); // カメラシェイク終了
}

// ===== ループ（固定60fpsタイムステップ：120Hz端末でも速度一定） =====
var _lastT=0,_acc=0,_STEP=1000/60;
var _errShown=false;
function showErr(where,e){
  if(_errShown)return; _errShown=true;
  var msg=(e&&e.message)?e.message:String(e);
  var ln=(e&&e.stack)?(e.stack.split('\n')[1]||''):'';
  mkBanner('⚠ '+where+': '+msg+'\n'+ln);
}
function loop(ts){
  if(!ts)ts=performance.now();
  if(!_lastT)_lastT=ts;
  var dt=ts-_lastT; _lastT=ts;
  if(dt>100)dt=100; // タブ復帰時の暴走防止
  _acc+=dt;
  try{
    while(_acc>=_STEP){ update(); _acc-=_STEP; }
  }catch(eU){ showErr('update',eU); }
  try{
    draw();
  }catch(eD){ showErr('draw',eD); }
  // ボタン状態（変化した時だけclassListを更新＝毎フレーム操作で.actが中断されるのを防ぐ）
  var blas=document.getElementById('blas');
  if(blas){
    // 盾ボタン：スキル取得(LV3+)で光って使用可能に
    var bgBtn=document.getElementById('bg');
    if(bgBtn){
      var bgState=p.skillLv>=3?'ready':'cd';
      if(_btnState.bg!==bgState){
        _btnState.bg=bgState;
        bgBtn.classList.remove('guard-ready','guard-cd');
        bgBtn.classList.add(bgState==='ready'?'guard-ready':'guard-cd');
        if(bgState==='ready') bgBtn.classList.add('skill-on'); else bgBtn.classList.remove('skill-on');
      }
    }
    // レーザーボタン：状態を文字列化して変化時のみ更新
    var lasState='none';
    if(p.skillLv>=4){
      var canFire=p.laserUses>0 && p.laserCD<=0 && !p.megaLaserActive;
      lasState=canFire?'ready':'cd';
    }
    if(_btnState.blas!==lasState){
      _btnState.blas=lasState;
      blas.classList.remove('laser-ready','laser-cd');
      if(lasState==='none'){
        blas.classList.remove('skill-on');
      } else {
        blas.classList.add('skill-on');
        blas.classList.add(lasState==='ready'?'laser-ready':'laser-cd');
      }
    }
    // レーザー残回数バッジ（テキストのみ・毎フレームでも.actに影響しない）
    var badge=blas.querySelector('.badge');
    if(badge){ badge.textContent = (p.skillLv>=4) ? (p.laserUses>0?String(p.laserUses):'✕') : ''; }
    // ジャンプボタン：2段ジャンプ(LV1+)
    var bjBtn=document.getElementById('bj');
    if(bjBtn){
      var bjOn=p.skillLv>=1;
      if(_btnState.bj!==bjOn){ _btnState.bj=bjOn; if(bjOn)bjBtn.classList.add('skill-on');else bjBtn.classList.remove('skill-on'); }
    }
    // 攻撃ボタン：ソード(LV2+)
    var baBtn=document.getElementById('ba');
    if(baBtn){
      var baOn=p.skillLv>=2;
      if(_btnState.ba!==baOn){ _btnState.ba=baOn; if(baOn)baBtn.classList.add('skill-on');else baBtn.classList.remove('skill-on'); }
    }
  }
  requestAnimationFrame(loop);
}

},{passive:false});

  var names={men_0:'ルーベルト',men_1:'バルト',men_2:'ジルヴェスター',men_3:'ユリアン',women_0:'クララ',women_1:'エルザ',women_2:'メルティ',women_3:'ブリギッタ'};
  var h='<div class="title-logo" style="font-size:22px">🏆 RANKING</div>'
    +'<div style="color:#ffcc88;font-size:11px;letter-spacing:2px;margin-bottom:16px">― ベストスコア TOP5 ―</div>';
  if(rankings.length===0){
    h+='<div style="color:#aaa;font-size:13px;margin:20px 0">まだ記録がないよ！<br>プレイしてランキングに挑戦しよう🔥</div>';
  } else {
    h+='<div style="display:flex;flex-direction:column;gap:6px;width:100%;max-width:300px;margin-bottom:18px">';
    for(var i=0;i<rankings.length;i++){
      var r=rankings[i];
      var medal=['🥇','🥈','🥉','4️⃣','5️⃣'][i];
      var bg=i===0?'rgba(255,215,0,0.18)':i===1?'rgba(192,192,192,0.15)':i===2?'rgba(205,127,50,0.15)':'rgba(255,255,255,0.05)';
      h+='<div style="display:flex;align-items:center;justify-content:space-between;background:'+bg+';border-radius:8px;padding:8px 12px">'
        +'<span style="font-size:18px;margin-right:8px">'+medal+'</span>'
        +'<span style="flex:1;text-align:left;color:#fff;font-size:16px;font-weight:bold">'+r.score+'</span>'
        +'<span style="color:#9fe4ff;font-size:10px;text-align:right">'+(names[r.char]||'?')+'<br>LV'+r.level+'</span>'
        +'</div>';
    }
    h+='</div>';
  }
  h+='<div style="color:#ffcc44;font-size:11px">BEST: '+bestScore+'</div>'
    +'<div id="rankBackBtn" style="margin-top:16px;color:#fff;font-size:13px;font-weight:bold;cursor:pointer;border:1.5px solid rgba(255,255,255,0.3);border-radius:8px;padding:8px 20px">◀ 戻る</div>';
  ov.innerHTML=h;
  ov.style.display='flex';
  setTimeout(function(){
    var bb=document.getElementById('rankBackBtn');
    if(bb){
      function back(e){ e.stopPropagation(); if(e.cancelable)e.preventDefault(); showTitleScreen(); }
      bb.addEventListener('touchstart',back,{passive:false});
      bb.addEventListener('click',back);
    }
  },30);
}
// タイトル画面を再表示
function showTitleScreen(){
  gs='title';
  ov.innerHTML='<div class="title-logo">⚔ 勇者の冒険 EX</div>'
    +'<div class="title-ep">― EXTREME EDITION ―</div>'
    +'<div class="press">▶ タップしてスタート ◀</div>'
    +'<div id="rankBtn" style="margin-top:14px;color:#ffcc44;font-size:13px;font-weight:bold;cursor:pointer;border:1.5px solid rgba(255,204,68,0.5);border-radius:8px;padding:7px 16px;background:rgba(255,204,68,0.1)">🏆 ランキングを見る</div>'
    +'<div id="achBtn" style="margin-top:8px;color:#9fe4ff;font-size:13px;font-weight:bold;cursor:pointer;border:1.5px solid rgba(127,216,255,0.5);border-radius:8px;padding:7px 16px;background:rgba(127,216,255,0.1)">🎖️ 実績を見る</div>'
    +'<div id="shopBtn" style="margin-top:8px;color:#ff9ee0;font-size:13px;font-weight:bold;cursor:pointer;border:1.5px solid rgba(255,158,224,0.5);border-radius:8px;padding:7px 16px;background:rgba(255,158,224,0.1)">🛍️ ショップ</div>';
  ov.style.display='flex';
  bindRankBtn();
}
// ランキング・実績ボタンのイベント設定
function bindRankBtn(){
  setTimeout(function(){
    var rb=document.getElementById('rankBtn');
    if(rb){
      function openRank(e){ e.stopPropagation(); if(e.cancelable)e.preventDefault(); sndInit(); showRanking(); }
      rb.addEventListener('touchstart',openRank,{passive:false});
      rb.addEventListener('click',openRank);
    }
    var ab=document.getElementById('achBtn');
    if(ab){
      function openAch(e){ e.stopPropagation(); if(e.cancelable)e.preventDefault(); sndInit(); showAchievements(); }
      ab.addEventListener('touchstart',openAch,{passive:false});
      ab.addEventListener('click',openAch);
    }
    var sb=document.getElementById('shopBtn');
    if(sb){
      function openShop(e){ e.stopPropagation(); if(e.cancelable)e.preventDefault(); sndInit(); showShop('sword'); }
      sb.addEventListener('touchstart',openShop,{passive:false});
      sb.addEventListener('click',openShop);
    }
  },30);
}
bindRankBtn(); // 初期タイトルにも設定

// ===== 実績一覧画面 =====
function showAchievements(){
  gs='ranking'; // タップでゲーム開始しないようranking状態を流用
  var unlocked=unlockedAch.length, total=ACHIEVEMENTS.length;
  var h='<div class="title-logo" style="font-size:20px">🎖️ ACHIEVEMENTS</div>'
    +'<div style="color:#9fe4ff;font-size:12px;margin-bottom:4px">達成 '+unlocked+' / '+total+'</div>'
    +'<div style="color:#ffd24a;font-size:13px;font-weight:bold;margin-bottom:12px">💰 所持ゴールド: '+totalGold+'G</div>'
    +'<div style="display:flex;flex-direction:column;gap:5px;width:100%;max-width:320px;margin-bottom:16px;max-height:46vh;overflow-y:auto">';
  for(var i=0;i<ACHIEVEMENTS.length;i++){
    var a=ACHIEVEMENTS[i];
    var done=unlockedAch.indexOf(a.id)>=0;
    h+='<div style="display:flex;align-items:center;gap:9px;background:'+(done?'rgba(255,210,74,0.16)':'rgba(255,255,255,0.04)')+';border:1px solid '+(done?'rgba(255,210,74,0.5)':'rgba(255,255,255,0.1)')+';border-radius:9px;padding:7px 11px;text-align:left">'
      +'<span style="font-size:22px;'+(done?'':'filter:grayscale(1) opacity(0.4)')+'">'+a.icon+'</span>'
      +'<div style="flex:1">'
        +'<div style="color:'+(done?'#ffe88a':'#888')+';font-size:12px;font-weight:bold">'+a.name+(done?' ✓':'')+'</div>'
        +'<div style="color:'+(done?'#dfeef7':'#666')+';font-size:9.5px">'+a.desc+'</div>'
      +'</div>'
      +'<span style="color:'+(done?'#9fe4ff':'#666')+';font-size:11px;font-weight:bold;white-space:nowrap">+'+a.gold+'G</span>'
      +'</div>';
  }
  h+='</div>'
    +'<div id="achBackBtn" style="color:#fff;font-size:13px;font-weight:bold;cursor:pointer;border:1.5px solid rgba(255,255,255,0.3);border-radius:8px;padding:8px 20px">◀ 戻る</div>';
  ov.innerHTML=h;
  ov.style.display='flex';
  setTimeout(function(){
    var bb=document.getElementById('achBackBtn');
    if(bb){
      function back(e){ e.stopPropagation(); if(e.cancelable)e.preventDefault(); showTitleScreen(); }
      bb.addEventListener('touchstart',back,{passive:false});
      bb.addEventListener('click',back);
    }
  },30);
}

// ===== ショップ画面（アンロック）=====
function showShop(tab){
  gs='ranking'; // タップでゲーム開始しないよう流用
  tab=tab||'sword';
  var items, kind, equipped;
  if(tab==='sword'){ items=SWORD_SKINS; kind='sword'; equipped=equippedSword; }
  else if(tab==='outfit'){ items=OUTFIT_SKINS; kind='outfit'; equipped=equippedOutfit; }
  else { items=SHIELD_SKINS; kind='shield'; equipped=equippedShield; }
  function tabStyle(t){ return 'color:'+(tab===t?'#222':'#fff')+';background:'+(tab===t?'#ffd24a':'rgba(255,255,255,0.1)')+';font-size:12px;font-weight:bold;padding:6px 13px;border-radius:7px;cursor:pointer'; }
  var h='<div class="title-logo" style="font-size:20px">🛍️ SHOP</div>'
    +'<div style="color:#ffd24a;font-size:14px;font-weight:bold;margin-bottom:10px">💰 '+totalGold+'G</div>'
    // タブ
    +'<div style="display:flex;gap:7px;margin-bottom:12px">'
      +'<div id="shopTabSW" style="'+tabStyle('sword')+'">⚔️ 剣</div>'
      +'<div id="shopTabOF" style="'+tabStyle('outfit')+'">👕 服</div>'
      +'<div id="shopTabSH" style="'+tabStyle('shield')+'">🛡️ 盾</div>'
    +'</div>'
    +'<div style="display:flex;flex-direction:column;gap:6px;width:100%;max-width:320px;margin-bottom:16px;max-height:42vh;overflow-y:auto">';
  for(var i=0;i<items.length;i++){
    var it=items[i];
    var owned=ownedItems.indexOf(it.id)>=0;
    var isEq=(equipped===it.id);
    var btnLabel, btnColor, btnId='shopAct_'+it.id;
    if(isEq){ btnLabel='装備中'; btnColor='#4caf50'; }
    else if(owned){ btnLabel='装備する'; btnColor='#2a9fd8'; }
    else if(totalGold>=it.price){ btnLabel=it.price+'G'; btnColor='#ffaa22'; }
    else { btnLabel=it.price+'G'; btnColor='#777'; }
    h+='<div style="display:flex;align-items:center;gap:10px;background:'+(isEq?'rgba(76,175,80,0.16)':'rgba(255,255,255,0.05)')+';border:1px solid '+(isEq?'rgba(76,175,80,0.5)':'rgba(255,255,255,0.12)')+';border-radius:9px;padding:8px 11px">'
      +'<span style="font-size:24px">'+it.icon+'</span>'
      +'<span style="flex:1;text-align:left;color:#fff;font-size:13px;font-weight:bold">'+it.name+'</span>'
      +'<span id="'+btnId+'" data-id="'+it.id+'" data-price="'+it.price+'" data-owned="'+(owned?1:0)+'" data-eq="'+(isEq?1:0)+'" style="color:#fff;background:'+btnColor+';font-size:11px;font-weight:bold;padding:5px 12px;border-radius:6px;cursor:pointer;white-space:nowrap">'+btnLabel+'</span>'
      +'</div>';
  }
  h+='</div>'
    +'<div id="shopBackBtn" style="color:#fff;font-size:13px;font-weight:bold;cursor:pointer;border:1.5px solid rgba(255,255,255,0.3);border-radius:8px;padding:8px 20px">◀ 戻る</div>';
  ov.innerHTML=h;
  ov.style.display='flex';
  setTimeout(function(){
    // タブ切り替え
    function tapEv(el,fn){ if(!el)return; el.addEventListener('touchstart',function(e){e.stopPropagation();if(e.cancelable)e.preventDefault();fn();},{passive:false}); el.addEventListener('click',function(e){e.stopPropagation();fn();}); }
    tapEv(document.getElementById('shopTabSW'),function(){ showShop('sword'); });
    tapEv(document.getElementById('shopTabOF'),function(){ showShop('outfit'); });
    tapEv(document.getElementById('shopTabSH'),function(){ showShop('shield'); });
    tapEv(document.getElementById('shopBackBtn'),function(){ showTitleScreen(); });
    // 各アイテムの購入/装備ボタン
    for(var i=0;i<items.length;i++){
      (function(it){
        var btn=document.getElementById('shopAct_'+it.id);
        if(!btn) return;
        tapEv(btn,function(){
          var owned=ownedItems.indexOf(it.id)>=0;
          if(equipped===it.id) return; // 装備中は何もしない
          if(owned){
            equipItem(it.id,kind); SFX.coin&&SFX.coin(); showShop(tab); // 装備して再描画
          } else {
            var r=buyItem(it.id,it.price);
            if(r==='ok'){ equipItem(it.id,kind); SFX.skillup&&SFX.skillup(); showShop(tab); }
            else if(r==='poor'){ btn.textContent='G不足'; btn.style.background='#cc4444'; }
          }
        });
      })(items[i]);
    }
  },30);
}
var _lastPauseT=0;
function togglePause(){
  var n=Date.now();
  if(n-_lastPauseT<350) return; // touchstart+click二重発火ガード
  _lastPauseT=n;
  if(gs==='play'){ gs='paused'; bgmStop(); }
  else if(gs==='paused'){ gs='play'; bgmStart(); }
}
var hPauseBtn=document.getElementById('hPause');
if(hPauseBtn){
  hPauseBtn.addEventListener('touchstart',function(e){e.preventDefault();togglePause();},{passive:false});
  hPauseBtn.addEventListener('click',function(e){togglePause();});
}
// ポーズ中はキャンバスタップでも再開
cv.addEventListener('touchstart',function(e){
  if(gs==='paused'){ e.preventDefault(); togglePause(); }
},{passive:false});
cv.addEventListener('click',function(e){
  if(gs==='paused'){ togglePause(); }
});

loop();
}catch(__bootErr){
  try{ mkBanner('⚠ 起動エラー: '+(__bootErr&&__bootErr.message?__bootErr.message:String(__bootErr))+'\n'+((__bootErr&&__bootErr.stack)?__bootErr.stack.split('\n').slice(1,3).join('\n'):'')); }catch(_){}
}
})();
</script>
