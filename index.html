}

// ===== 衝突 =====
function aabb(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

function moveY(ent,ew,eh){
  var steps=Math.ceil(Math.abs(ent.vy)/4)+1;
  var dy=ent.vy/steps;
  for(var s=0;s<steps;s++){
    var prevBottom=ent.y+eh;   // このステップ移動前の足の位置
    ent.y+=dy;
    if(ent.vy<0) continue;     // 上昇中は台をすり抜ける（従来通り）
    for(var ti=0;ti<tiles.length;ti++){
      var t=tiles[ti]; if(t.goal) continue;
      if(ent.x+ew<t.x-2||ent.x>t.x+t.w+2) continue;
      var cb=ent.y+eh;
      if(cb>=t.y && ent.y<t.y){
        if(ent.x+ew>t.x+2&&ent.x<t.x+t.w-2){
          // ★浮き台(g:false)は「上から降りてきた時」だけ着地（横潜り込みワープ防止）。
          //   地面(g:true)は厚みがあるので従来通りスナップ。
          if(t.g || prevBottom<=t.y+Math.max(8,Math.abs(dy)+3)){
            ent.y=t.y-eh;ent.vy=0;ent.onG=true;break;
          }
        }
      }
    }
    if(ent.onG) break;
  }
}

// ===== 更新 =====
function update(){
  if(gs!=='play') return;
  if(hitStop>0){ hitStop--; return; } // 時を止めて打撃感を出す
  fr++;
  var jNow=gJ(), jEdge=jNow&&!pJprev; pJprev=jNow;
  var aNow=gA(), aEdge=aNow&&!pAprev; pAprev=aNow;

  // 無敵タイマー更新
  if(p.invTimer>0) p.invTimer--;

  // 急降下斬り：2段ジャンプ中に攻撃ボタン（ソード所持時）
  if(aEdge && !p.onG && p.djUsed && p.skillLv>=2 && !p.plunge && !p.megaLaserActive){
    p.plunge=true;
    p.vy=Math.max(p.vy,13); p.vx*=0.4;
    p.swingId=(p.swingId||0)+1;
    p.atkT=0; p.atkCD=10;
    SFX.slash();
  }
  // 急降下中の炎トレイル
  if(p.plunge && fr%2===0){
    ptcl.push({x:p.x+pw()/2+(Math.random()-0.5)*8,y:p.y+ph()*0.3,
      vx:(Math.random()-0.5)*1.5,vy:-(1+Math.random()*1.5),
      life:14,ml:14,col:Math.random()<0.5?'#ffaa00':'#ffe44d',r:2+Math.random()*1.5});
  }

  // 通常攻撃（ソード以上で連射速UP）
  if(aNow && p.atkCD<=0 && !p.megaLaserActive && !p.plunge){
    p.atkT=14;
    p.atkCD=(p.skillLv>=2?16:28);
    if(p.trait==='atk') p.atkCD=Math.round(p.atkCD*0.6);  // 剣豪：攻撃速度UP（CD40%短縮）
    p.swingId=(p.swingId||0)+1; // スイングごとに一意ID
  }
  if(p.atkT>0)p.atkT--;
  if(p.atkCD>0)p.atkCD--;
  if(p.ifrm>0)p.ifrm--;
  if(p.guardEffect>0)p.guardEffect--;
  if(bossClearMsg>0)bossClearMsg--;

  // 巨大レーザー（skillLv>=4・ボタン押下で即時発射・1ステージ2回まで）
  var lasEdge=gLas()&&!p.lasPrep; p.lasPrep=gLas();
  if(p.skillLv>=4){
    if(p.laserCD>0) p.laserCD--;
    // ① ボタン押下：即発射せず、まず剣を振るモーション＋溜めを開始
    if(lasEdge && p.laserCD<=0 && !p.megaLaserActive && p.laserUses>0 && !p.laserWindup){
      p.laserWindup=16;     // 溜めフレーム（剣を振りかぶる→振り抜く）
      p.atkT=16;            // 剣振りモーション発動
      p.swingId=(p.swingId||0)+1;
      p.laserCD=180;        // 3秒クールタイム（多重発射防止）
      p.laserUses--;        // 残回数消費（押した時点で確定）
      SFX.slash();          // 振りかぶりの剣音
    }
    // ② 溜めカウントダウン → 振り抜く瞬間(残り6f)にレーザー発射
    if(p.laserWindup>0){
      p.laserWindup--;
      // 振りかぶり中はチャージ光（パーティクル）
      if(p.laserWindup>6 && fr%2===0){
        var cwx=p.x+pw()/2+(p.dir>0?10:-10);
        ptcl.push({x:cwx,y:p.y+ph()*0.35,vx:(p.dir>0?1:-1)*(1+Math.random()),vy:(Math.random()-0.5)*2,
          life:12,ml:12,col:Math.random()<0.5?'#00eeff':'#ffffff',r:2+Math.random()*1.5});
      }
      // 振り抜きの瞬間＝レーザー発射
      if(p.laserWindup===6){
        p.megaLaserActive=true;
        p.megaLaserTimer=50;
        SFX.laser();
        // 発射の衝撃
        shake=Math.max(shake,5);
        var mzx=p.x+pw()/2+(p.dir>0?16:-16);
        burst(mzx,p.y+ph()*0.35,'#00eeff',12);
        burst(mzx,p.y+ph()*0.35,'#ffffff',6);
      }
    }
    p.laserCharge=0;
  }
  if(p.megaLaserActive){
    p.megaLaserTimer--;
    if(p.megaLaserTimer<=0) p.megaLaserActive=false;
    // 巨大レーザー：画面内（カメラ範囲）かつ進行方向の敵のみヒット
    var laserY=p.y+ph()*0.35; // レーザーのY座標（描画と合わせる）
    for(var ei2=0;ei2<enms.length;ei2++){
      var e2=enms[ei2];
      if(e2.dead) continue;
      var ex2=e2.x-cam; // 画面上のX座標
      // ① 画面内にいる（-20〜W+20px）
      var onScreen=(ex2>-20&&ex2<W+20);
      // ② 進行方向にいる
      var inFront=(p.dir>0&&e2.x>p.x)||(p.dir<0&&e2.x<p.x+pw());
      // ③ レーザーのY範囲内（±30px）
      var inRange=Math.abs((e2.y+e2.h/2)-laserY)<e2.h*0.8+30;
      if(onScreen&&inFront&&inRange){
        e2.hp-=0.4;
        if(e2.hp<=0){
          e2.dead=true;e2.dy=24;
          hitStop=Math.max(hitStop,3);
          addKill(e2.x+e2.w/2,e2.y,200*level,'#00eeff');
          maybeDrop(e2);
          burst(e2.x+e2.w/2,e2.y+e2.h/2,'#00eeff',10);
          burst(e2.x+e2.w/2,e2.y+e2.h/2,'#ffffff',5);
        }
      }
    }
  }

  // 移動（なめらかな加速・減速 / 地上と空中で特性を分離）
  // 盾ガード：ボタンを押した瞬間から一定時間ガードを保持（タップでも確実に発動）
  if(gG() && p.skillLv>=3){ p.guardHold=14; }       // 押すたびに約0.23秒ガード延長
  else if(p.guardHold>0){ p.guardHold--; }
  var guarding=(p.skillLv>=3)&&(gG()||p.guardHold>0);
  var MAXSPD=guarding?1.5:(4.4*(p.trait==='speed'?1.18:1));  // 俊足：移動速度UP
  var ACCEL=p.onG?0.7:0.5;        // 空中はやや鈍く（慣性感）
  var FRIC=p.onG?0.78:0.96;       // 空中は摩擦弱め＝勢いが残る
  if(gL()){
    p.vx-=ACCEL*(p.vx>0?1.8:1);   // ターンアシスト（切り返しが速い）
    if(p.vx<-MAXSPD)p.vx=-MAXSPD; p.dir=-1;
  }
  else if(gR()){
    p.vx+=ACCEL*(p.vx<0?1.8:1);
    if(p.vx>MAXSPD)p.vx=MAXSPD; p.dir=1;
  }
  else{ p.vx*=FRIC; if(Math.abs(p.vx)<0.1)p.vx=0; }

  // コヨーテタイム（地面を離れて数フレームはジャンプ可能）
  if(p.onG){ p.coyote=6; } else if(p.coyote>0){ p.coyote--; }
  // ジャンプバッファ（着地直前のボタン入力を受付）
  if(jEdge){ p.jumpBuf=6; } else if(p.jumpBuf>0){ p.jumpBuf--; }

  // ジャンプ実行
  var jumpBoost=(p.trait==='jump')?1.18:1;  // 跳躍：ジャンプ力UP
  if(p.jumpBuf>0){
    if(p.onG||p.coyote>0){
      p.vy=(-12.5-Math.abs(p.vx)*0.16)*jumpBoost; p.onG=false; p.coyote=0; p.djUsed=false; p.jumpBuf=0;
      p.squash=1; // ジャンプ時スカッシュ
      SFX.jump();
      burst(p.x+pw()/2,p.y+ph(),'#ffe44d',5);
    } else if(p.skillLv>=1 && !p.djUsed){
      p.vy=-11*jumpBoost; p.djUsed=true; p.jumpBuf=0;
      p.squash=1;
      SFX.djump();
      // 2段ジャンプの円形エフェクト
      for(var dj=0;dj<8;dj++){
        var da=(Math.PI*2/8)*dj;
        ptcl.push({x:p.x+pw()/2,y:p.y+ph(),vx:Math.cos(da)*3,vy:Math.sin(da)*3,life:18,ml:18,col:'#88ccff',r:2.5});
      }
    }
  }
  // 可変ジャンプ高度（ボタンを離すと上昇が弱まる＝低いジャンプ）
  if(!gJ() && p.vy<0){ p.vy*=0.86; }
  // 2段ジャンプリセット
  if(p.onG) p.djUsed=false;

  // 重力（落下時は強め・頂点付近は弱め＝マリオ的な滞空感）
  var g;
  if(!p.onG && Math.abs(p.vy)<1.8) g=GRAV*0.5;  // アペックスハング
  else if(p.vy>0) g=GRAV*1.25;
  else g=GRAV;
  p.vy+=g; if(p.vy>16)p.vy=16;
  p.x+=p.vx;
  var wasAir=!p.onG;
  p.onG=false;
  moveY(p,pw(),ph());
  // 急降下斬りの着地衝撃波
  if(p.onG && wasAir && p.plunge){
    p.plunge=false;
    shake=Math.max(shake,8); hitStop=Math.max(hitStop,4);
    p.squash=-1.5;
    SFX.guard();
    burst(p.x+pw()/2,p.y+ph(),'#ffaa00',14);
    burst(p.x+pw()/2,p.y+ph(),'#ffffff',8);
    // 半径75px内の敵に2ダメージ（ボスは1）
    for(var si=0;si<enms.length;si++){
      var se=enms[si];
      if(se.dead) continue;
      var sdx=Math.abs((se.x+se.w/2)-(p.x+pw()/2));
      var sdy=Math.abs((se.y+se.h/2)-(p.y+ph()/2));
      if(sdx<75 && sdy<60){
        se.hp-=se.isBoss?1:2;
        burst(se.x+se.w/2,se.y+se.h/2,'#ffaa00',6);
        if(se.hp<=0){
          se.dead=true; se.dy=24;
          addKill(se.x+se.w/2,se.y,150*level,'#ff8844');
          maybeDrop(se);
          SFX.kill();
        }
      }
    }
  }
  // 着地スカッシュ＋土煙
  if(p.onG && wasAir && p.vyPrev>6){
    p.squash=-1.2;
    for(var ld=0;ld<6;ld++){
      ptcl.push({x:p.x+pw()/2,y:p.y+ph()-2,
        vx:(ld<3?-1:1)*(0.8+Math.random()*1.6),vy:-(0.2+Math.random()*0.6),
        life:16,ml:16,col:'rgba(200,190,160,0.8)',r:1.5+Math.random()*1.2});
    }
  }
  p.vyPrev=p.vy;
  // 安全地点の記録（地面の上＝穴でない場所にいる時のX位置を覚えておく）
  if(p.onG && getGroundY(p.x+pw()/2)<GROUND+10){
    p.lastSafeX=p.x; p.lastSafeY=p.y;
  }
  // スカッシュ回復
  if(p.squash>0)p.squash=Math.max(0,p.squash-0.15);
  if(p.squash<0)p.squash=Math.min(0,p.squash+0.15);

  // 穴落下 → 40%ダメージ＋落下直前の位置で復活（3秒無敵）。HP0ならゲームオーバー
  if(p.y>H+60){
    p.hp-=40;  // 40%ダメージ
    if(p.hp<=0){
      p.hp=0; updHUD();
      showGameOver();
      return;
    }
    updHUD();
    // 落下直前の安全位置へ復活
    var rx=(p.lastSafeX!=null)?p.lastSafeX:Math.max(60,p.x-60);
    p.x=rx; p.y=GROUND-BH; p.vx=0; p.vy=0; p.onG=false;
    p.ifrm=180;        // 3秒無敵（60fps×3）
    p.plunge=false;
    dmgFlash=16; shake=Math.max(shake,6);
    SFX.damage();
    pops.push({x:p.x+pw()/2,y:p.y-6,txt:'-40 落下!',life:50,ml:50,col:'#ff8844'});
    burst(p.x+pw()/2,p.y+ph()/2,'#ff8844',12);
    return;
  }
  cam+=((p.x+p.vx*9)-W*0.3-cam)*0.12; // vx分だけ先読みスクロール
  if(cam<0)cam=0;
  if(shake>0)shake*=0.85; // シェイク減衰
  if(p.atkT>0)           p.st='atk';
  else if((gG()||p.guardHold>0)&&p.skillLv>=3) p.st='guard'; // 盾スキル持ちのみ防御ポーズ（LV3・保持中も）
  else if(!p.onG)        p.st='jump';
  else if(Math.abs(p.vx)>0.4) p.st='run';
  else                   p.st='idle';
  p.at++;if(p.at>7){p.af=(p.af+1)%4;p.at=0;}

  // 走行中の砂埃（地面を走るとき足元から土煙）
  if(p.st==='run' && p.onG && fr%5===0){
    ptcl.push({x:p.x+pw()/2-p.dir*6,y:p.y+ph()-2,
      vx:-p.dir*(0.5+Math.random()),vy:-(0.3+Math.random()*0.8),
      life:14,ml:14,col:'rgba(200,190,160,0.7)',r:1.5+Math.random()});
  }

  // 攻撃ボックス（剣の長さに合わせて調整）
  var aw=p.skillLv>=2?52:38; // 大剣42px+余裕 / 通常28px+余裕
  var ab=p.atkT>0?{x:p.dir>0?p.x+pw():p.x-aw,y:p.y-ph()*0.12,w:aw,h:ph()*0.95}:null; // 上方向に拡張＝空中の飛行敵にも届く
  if(p.plunge){ ab={x:p.x-8,y:p.y+ph()*0.4,w:pw()+16,h:ph()*0.9}; } // 急降下中は真下に判定

  // ゴール（LV5はボス撃破後のみ有効）
  if(p.x+pw()>GOAL_X-10 && !(level===5 && !bossDefeated)){
    score+=500+(6-level)*150;
    gs='levelup';
    shake=Math.max(shake,10); // ゴール時の歓喜シェイク
    SFX.goal();
    // 紙吹雪（カラフルに舞う）
    var confCols=['#ffe44d','#ff88ff','#88ffaa','#88ccff','#ff8866','#ffffff'];
    for(var gi=0;gi<40;gi++){
      ptcl.push({
        x:p.x+pw()/2+(Math.random()-0.5)*80,
        y:p.y-20-Math.random()*60,
        vx:(Math.random()-0.5)*4,
        vy:-(1+Math.random()*3),
        life:50+Math.random()*30,ml:80,
        col:confCols[gi%confCols.length],r:2+Math.random()*2
      });
    }
    setTimeout(nextLevel,800);
    return;
  }

  // 敵
  for(var ei=0;ei<enms.length;ei++){
    var e=enms[ei];
    if(e.dead){if(e.dy>0)e.dy--;continue;}

    // 一方向移動（常に左へ）
    var baseSpd=e.baseSpd||Math.abs(e.vx);

    if(e.type==='fly'||e.type==='bomber'){
      e.vx=-baseSpd;
      e.y+=Math.sin(fr*0.05+ei)*0.9;
      e.x+=e.vx;
    } else if(e.type==='diver'){
      // ダイバー：通常は左移動、一定間隔で急降下
      e.diveTimer=(e.diveTimer||0)+1;
      if(!e.diving && e.diveTimer>=(e.diveCD||90)){
        var pdx=p.x-e.x, pdy=p.y-e.y;
        if(Math.abs(pdx)<300){
          e.diving=true; e.diveTimer=0;
          e.diveVx=pdx*0.06; e.diveVy=Math.abs(pdy)*0.15+4;
        }
      }
      if(e.diving){
        e.x+=e.diveVx; e.y+=e.diveVy;
        e.diveVy+=0.4;
        if(e.y>GROUND-e.h){ e.y=GROUND-e.h; e.diving=false; e.diveTimer=0; e.diveCD=Math.floor(Math.random()*90)+60; }
      } else {
        e.vx=-baseSpd*0.6; e.x+=e.vx;
        e.y+=Math.sin(fr*0.04+ei)*0.7;
      }
    } else if(e.type==='shooter'){
      // シューター：射程内でも少しだけ動く（完全停止はなし）
      var sdist=Math.abs(p.x-e.x);
      if(sdist<250 && sdist>80){
        e.vx=baseSpd*0.15*(e.x>p.x?-1:1); // 微速でプレイヤー側へ向く
      } else {
        e.vx=-baseSpd;
      }
      e.vx=checkHole(e,e.vx);
      e.vy+=GRAV; e.x+=e.vx; e.onG=false;
      moveY(e,e.w,e.h);
    } else if(e.type==='fire'){
      // ファイアー：左右往復しながら進む
      e.vx=-baseSpd;
      e.vx=checkHole(e,e.vx);
      e.vy+=GRAV; e.x+=e.vx; e.onG=false;
      moveY(e,e.w,e.h);
    } else if(e.type==='boss'){
      // ボスドラゴン：定位置付近でゆっくり上下＋プレイヤーへ寄る
      if(e.bossHome===undefined) e.bossHome=e.x;
      // ★第2形態（RAGE）：HP3以下で覚醒
      if(!e.rage && e.hp<=3){
        e.rage=true;
        e.shootInterval=55; // 連射が速くなる
        shake=Math.max(shake,12); hitStop=Math.max(hitStop,8);
        SFX.bossRoar();
        pops.push({x:e.x+e.w/2,y:e.y-30,txt:'RAGE MODE!!',life:70,ml:70,col:'#ff44ff'});
        burst(e.x+e.w/2,e.y+e.h/2,'#cc00ff',24);
        burst(e.x+e.w/2,e.y+e.h/2,'#ff44ff',16);
      }
      var bobSpd=e.rage?0.08:0.04, bobAmp=e.rage?22:14;
      e.y=GROUND-e.h+Math.sin(fr*bobSpd)*bobAmp;
      var bdist=p.x-e.x;
      var chase=e.rage?1.2:0.6;
      if(Math.abs(bdist)<260){ e.x+=(bdist>0?chase:-chase); }
      else { e.x+=(e.bossHome-e.x)*(e.rage?0.04:0.02); }
      // RAGE中は紫オーラ
      if(e.rage && fr%3===0){
        ptcl.push({x:e.x+Math.random()*e.w,y:e.y+Math.random()*e.h,
          vx:(Math.random()-0.5),vy:-(0.5+Math.random()),
          life:20,ml:20,col:'#cc00ff',r:2+Math.random()*2});
      }
    } else if(e.type==='ghost'){
      e.vx=-baseSpd*0.8;
      e.y=GROUND-e.h-40+Math.sin(fr*0.03+ei)*30;
      e.x+=e.vx;
    } else {
      // normal / fast / giant: 穴の手前で折り返す
      if(e.moveDir===undefined) e.moveDir=-1;          // 進行方向（-1=左 / 1=右）
      e.vx=baseSpd*e.moveDir;
      var vx0=e.vx;
      e.vx=checkHole(e,e.vx);
      if(e.vx!==vx0) e.moveDir=-e.moveDir;             // 穴で折り返したら向き反転
      e.vy+=GRAV; e.x+=e.vx; e.onG=false;
      moveY(e,e.w,e.h);
    }

    // ★ステージ左端での折り返し（消滅させず、穴に落ちない範囲で往復）
    if(e.type!=='boss' && e.type!=='ghost'){
      if(e.x < 24){ e.x=24; if(e.moveDir!==undefined) e.moveDir=1; else e.vx=Math.abs(e.vx||baseSpd); }
      if(e.x > GOAL_X+40){ e.x=GOAL_X+40; if(e.moveDir!==undefined) e.moveDir=-1; }
    }
    // 穴やステージ外に落ちた時だけ消滅（地面に立つ敵が奈落に落ちた場合の保険）
    if(e.y > H+80){ e.dead=true; continue; }

    // 射撃（typeで管理）
    if(e.shootInterval>0){
      e.shootTimer++;
      var dx=p.x-e.x;
      var dist=Math.abs(dx);
      if(e.shootTimer>=e.shootInterval && dist<400){
        e.shootTimer=0;
        // shooterはレーザー、fireは火の玉
        var bType=(e.type==='shooter')?'laser':'fire';
        var bSpd=bType==='laser'?7:3.5;
        var dirToP=dx>0?1:-1;
        var bVx=dirToP*bSpd;
        var bVy=bType==='laser'?0:(dist>200?-1.8:-0.8); // 火の玉は少し上に投げる
        bullets.push({
          x:e.x+(dirToP>0?e.w:0),
          y:e.y+e.h*0.4,
          vx:bVx, vy:bVy,
          type:bType,
          life:120, r:bType==='laser'?3:6,
        });
      }
    }

    // 爆弾投下（bomberタイプ）
    if(e.type==='bomber' && e.bomberInterval>0){
      e.bomberTimer++;
      var ex_cam=e.x-cam;
      if(e.bomberTimer>=e.bomberInterval && ex_cam>-50 && ex_cam<W+50){
        e.bomberTimer=0;
        bombs.push({
          x:e.x+e.w/2, y:e.y+e.h,
          vx:0, vy:0,
          r:7, life:200,
          exploded:false, exTimer:0,
        });
      }
    }

    if(ab&&aabb(ab,e)){
      // ゴーストは無敵シールドのみ有効
      if(e.type==='ghost' && p.skillLv<5){ /* 剣無効 */ }
      else if(e.lastHitSwing===p.swingId){ /* このスイングで既にヒット済み */ }
      else {
        e.lastHitSwing=p.swingId; // このスイングでヒット記録
        e.hp-=(p.trait==='atk'?2:1);  // 剛力：剣の威力+1
        shake=Math.max(shake,3); // ヒット時シェイク
        hitStop=Math.max(hitStop,2); // 斬った瞬間2F停止
        SFX.slash();
        // ヒットエフェクト強化：火花＋白フラッシュ
        burst(e.x+e.w/2,e.y+e.h/2,'#ffaa00',8);
        burst(e.x+e.w/2,e.y+e.h/2,'#ffffff',5);
        if(e.hp<=0){
          e.dead=true; e.dy=24;
          shake=Math.max(shake,6); // 撃破時は大きくシェイク
          hitStop=Math.max(hitStop,4); // 撃破は4F停止＝重い手応え
          addKill(e.x+e.w/2,e.y,100*level,'#ffe44d');
          maybeDrop(e);
          SFX.kill();
          statAdd('kills',1);  // 実績用：撃破数
          burst(e.x+e.w/2,e.y+e.h/2,'#ffe44d',14);
          burst(e.x+e.w/2,e.y+e.h/2,'#ff6600',8);
          // ボス撃破 → 道が開ける。ゴールまで走ってクリア
          if(e.isBoss){
            score+=2000;
            statAdd('bossKills',1);  // 実績用：ボス撃破
            shake=Math.max(shake,14);
            hitStop=Math.max(hitStop,10); // ボス撃破は溜めて爆発
            pops.push({x:e.x+e.w/2,y:e.y-30,txt:'+2000!!',life:60,ml:60,col:'#ff88ff'});
            SFX.kill();
            bossDefeated=true; // ゴール解放フラグ
            var bc=['#ffe44d','#ff88ff','#88ffaa','#88ccff','#ff8866','#ffffff'];
            for(var bk=0;bk<60;bk++){
              ptcl.push({x:e.x+e.w/2+(Math.random()-0.5)*120,y:e.y+e.h/2-Math.random()*80,
                vx:(Math.random()-0.5)*5,vy:-(1+Math.random()*4),life:60+Math.random()*30,ml:90,
                col:bc[bk%bc.length],r:2+Math.random()*2.5});
            }
            // 「GO!」ゴールへ誘導メッセージ
            bossClearMsg=120;
          }
        } else { SFX.hit(); }
        updHUD();
      }
    }
    if(!e.dead&&p.ifrm<=0&&aabb({x:p.x,y:p.y,w:pw(),h:ph()},e)){
      // 全ての敵の体当たり（物理接触）でダメージ。被弾後はifrm(約1.5秒)無敵で連続被弾を防ぐ。
      // 盾スキル(LV3+)でガード中は体当たりを防御（射撃同様）。
      var guardingBody=(p.st==='guard' && p.skillLv>=3);
      if(guardingBody){
        if(p.guardEffect<=0){
          p.guardEffect=12; SFX.guard();
          shake=Math.max(shake,3);
          burst(p.x+pw()/2,p.y+ph()/2,'#88ccff',6);
          // 軽くノックバック（押し返す）
          p.vx=(p.dir>0?-2.5:2.5);
        }
      } else {
        takeDamage(calcDamage(e.type));
        updHUD();
        if(p.hp<=0){ showGameOver(); }
      }
    }
  }

  // コイン
  for(var ci=0;ci<cins.length;ci++){
    var c=cins[ci];if(c.got)continue;
    if(aabb({x:p.x,y:p.y,w:pw(),h:ph()},c)){
      c.got=true; score+=30;
      p.totalCoins+=(p.trait==='coin'?2:1);  // 幸運：コイン2倍
      statAdd('totalCoins',1); statAdd('runGold',1);  // 実績用：累計コイン
      SFX.coin();
      burst(c.x+7,c.y+7,'#ffe44d',5);
      // コイン10個ごとにスキルアップ（最大LV5）
      var newSkill=Math.min(5,Math.floor(p.totalCoins/10));
      if(newSkill>p.skillLv){
        p.skillLv=newSkill;
        SFX.skillup();
        burst(p.x+pw()/2,p.y+ph()/2,'#ffffff',18);
        if(p.skillLv===5) p.invTimer=600; // 初回取得：10秒
      }
      // LV5取得後：コイン10個ごとに無敵を自動再発動（600f=10秒）
      if(p.skillLv>=5 && p.totalCoins%10===0){
        p.invTimer=600;
        burst(p.x+pw()/2,p.y+ph()/2,'#ffe44d',20);
        burst(p.x+pw()/2,p.y+ph()/2,'#ffffff',12);
      }
      updHUD();
    }
  }

  ptcl.forEach(function(q){q.x+=q.vx;q.y+=q.vy;q.vy+=0.14;q.life--;});
  pops.forEach(function(o){o.y-=0.7;o.life--;});
  pops=pops.filter(function(o){return o.life>0;});
  if(comboT>0){ comboT--; if(comboT===0)combo=0; }

  // ===== ドロップアイテム更新 =====
  for(var ii=items.length-1;ii>=0;ii--){
    var it=items[ii];
    if(!it.onG){
      it.vy+=0.3; it.y+=it.vy;
      var gy2=getGroundY(it.x);
      if(it.y>=gy2-8){ it.y=gy2-8; it.onG=true; }
      if(it.y>H+40){ items.splice(ii,1); continue; } // 穴に落ちた
    }
    it.life--;
    if(it.life<=0 || it.x<cam-60){ items.splice(ii,1); continue; }
    // 取得判定
    if(aabb({x:p.x,y:p.y,w:pw(),h:ph()},{x:it.x-8,y:it.y-8,w:16,h:16})){
      if(p.hp<p.maxHP){
        var healAmt=(p.trait==='heal')?15:10;  // 女神の祝福：回復量+50%
        p.hp=Math.min(p.maxHP,p.hp+healAmt); updHUD();
        pops.push({x:it.x,y:it.y-10,txt:'❤+'+healAmt,life:48,ml:48,col:'#ff6688'});
        SFX.skillup();
      } else {
        score+=300;
        pops.push({x:it.x,y:it.y-10,txt:'+300',life:42,ml:42,col:'#ff6688'});
        SFX.coin();
      }
      burst(it.x,it.y,'#ff6688',10);
      items.splice(ii,1);
    }
  }
  ptcl=ptcl.filter(function(q){return q.life>0;});

  // 爆弾更新（防御不可）
  for(var boi=bombs.length-1;boi>=0;boi--){
    var bo=bombs[boi];
    if(bo.exploded){
      bo.exTimer++;
      // 爆発範囲内のプレイヤーにダメージ（防御不可）
      if(bo.exTimer===1){
        var edx=p.x+pw()/2-bo.x, edy=p.y+ph()/2-bo.y;
        if(Math.sqrt(edx*edx+edy*edy)<50){
          takeDamage(calcDamage('bomber')); updHUD();
          if(p.hp<=0){ showGameOver(); }
        }
        burst(bo.x,bo.y,'#ff6600',12);
        burst(bo.x,bo.y,'#ffcc00',8);
      }
      if(bo.exTimer>20) bombs.splice(boi,1);
      continue;
    }
    bo.vy+=GRAV;
    bo.x+=bo.vx; bo.y+=bo.vy;
    bo.life--;
    // 地面に着いたら爆発
    if(bo.y>=GROUND-bo.r || bo.life<=0){
      bo.y=GROUND-bo.r;
      bo.exploded=true; bo.exTimer=0;
    }
    // 画面外は削除
    if(bo.x-cam<-100||bo.x-cam>W+100) bombs.splice(boi,1);
  }

  // 弾更新
  for(var bi=bullets.length-1;bi>=0;bi--){
    var b=bullets[bi];
    b.x+=b.vx;
    b.y+=b.vy;
    if(b.type==='fire') b.vy+=0.12; // 火は重力あり
    b.life--;
    // 画面外・寿命切れ除去
    if(b.life<=0 || b.x-cam<-20 || b.x-cam>W+20 || b.y>H+20){
      bullets.splice(bi,1); continue;
    }
    // プレイヤーに当たる
    var bBox={x:b.x-b.r,y:b.y-b.r,w:b.r*2,h:b.r*2};
    if(p.ifrm<=0 && aabb({x:p.x,y:p.y,w:pw(),h:ph()},bBox)){
      bullets.splice(bi,1);
      if((gG()||p.guardHold>0)&&p.skillLv>=3){
        // 盾スキル（LV3）＋防御ボタン → ブロック成功！
        burst(p.x+pw()/2,p.y+ph()*0.3,'#aaddff',10); // 青白いスパーク
        burst(p.x+pw()/2,p.y+ph()*0.3,'#ffffff',6);  // 白フラッシュ
        burst(p.x+pw()/2,p.y+ph()*0.3,'#50dc78',5);  // 緑の防御光
        p.guardEffect=30; // GUARD!テキスト表示フレーム数
        SFX.guard();
        p.ifrm=15; // 点滅しない程度の短い無敵（4フレーム単位で点滅するので15フレーム未満）
      } else {
        takeDamage(calcDamage(b.type==='laser'?'shooter':'fire'));
        if(p.hp<=0){ showGameOver(); }
      }
      updHUD();
    }
  }
  score+=0.04;
}

// ===== 主人公描画 =====
// ===== 鬼の顔（ブリギッタ専用ベクター頭部）=====
// 座標系: drawStick内のスケール済みctxで、顔中心(0, cy)に描く。HRは頭半径。
function drawOniHead(ctx, HR, cy, skinCol, hairCol, skillLv, ifrm, fillOL, shade, sphGrad){
  var oniSkin='#b53a2e';        // 鬼の赤い肌
  var oniSkinSh='#8a261c';      // 影
  var hornCol='#e8d9a8';        // 角（生成り）
  var hornSh='#b8a878';
  if(skillLv>=5 && ifrm>0){ ctx.shadowColor='#ffe44d'; ctx.shadowBlur=14; }
  // ── 後ろ髪（黒・肩までワイルドに広がる）──
  ctx.fillStyle='#1a1414';
  ctx.beginPath();
  ctx.moveTo(-HR*1.05, cy-HR*0.2);
  ctx.quadraticCurveTo(-HR*1.5, cy+HR*0.9, -HR*0.7, cy+HR*1.5);
  ctx.lineTo(HR*0.7, cy+HR*1.5);
  ctx.quadraticCurveTo(HR*1.5, cy+HR*0.9, HR*1.05, cy-HR*0.2);
  ctx.closePath(); ctx.fill();
  // ── 2本の角（額の左右・先が尖る）──
  function horn(sx){
    ctx.save();
    var hg=ctx.createLinearGradient(sx*HR*0.55-3, cy-HR*1.9, sx*HR*0.55+3, cy-HR*0.9);
    hg.addColorStop(0, hornCol); hg.addColorStop(1, hornSh);
    ctx.fillStyle=hg;
    ctx.strokeStyle='rgba(60,40,20,0.4)'; ctx.lineWidth=1; ctx.lineJoin='round';
    ctx.beginPath();
    ctx.moveTo(sx*HR*0.32, cy-HR*0.78);
    ctx.quadraticCurveTo(sx*HR*0.5, cy-HR*1.55, sx*HR*0.78, cy-HR*1.92); // 先端
    ctx.quadraticCurveTo(sx*HR*0.62, cy-HR*1.4, sx*HR*0.7, cy-HR*0.85);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // 角の節
    ctx.strokeStyle=hornSh; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(sx*HR*0.42,cy-HR*1.1); ctx.lineTo(sx*HR*0.6,cy-HR*1.15); ctx.stroke();
    ctx.restore();
  }
  horn(-1); horn(1);
  // ── 顔（赤い丸顔・立体グラデ）──
  fillOL(function(){ctx.beginPath();ctx.arc(0,cy,HR,0,Math.PI*2);}, sphGrad(ctx,0,cy,HR,oniSkin), 'rgba(40,15,12,0.4)');
  // 頬の陰
  ctx.fillStyle='rgba(90,20,15,0.3)';
  ctx.beginPath();ctx.arc(-HR*0.45,cy+HR*0.25,HR*0.32,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(HR*0.45,cy+HR*0.25,HR*0.32,0,Math.PI*2);ctx.fill();
  // ── 前髪（黒・ギザギザM字でワイルド・目元は出す）──
  ctx.fillStyle='#221818';
  ctx.beginPath();
  ctx.moveTo(-HR*0.95, cy-HR*0.5);
  ctx.lineTo(-HR*0.78, cy-HR*0.98);
  ctx.lineTo(-HR*0.52, cy-HR*0.66);
  ctx.lineTo(-HR*0.24, cy-HR*1.0);
  ctx.lineTo(0, cy-HR*0.72);
  ctx.lineTo(HR*0.24, cy-HR*1.0);
  ctx.lineTo(HR*0.52, cy-HR*0.66);
  ctx.lineTo(HR*0.78, cy-HR*0.98);
  ctx.lineTo(HR*0.95, cy-HR*0.5);
  ctx.quadraticCurveTo(0, cy-HR*0.85, -HR*0.95, cy-HR*0.5);
  ctx.closePath(); ctx.fill();
  // 前髪のツヤ
  ctx.strokeStyle='rgba(120,90,90,0.4)'; ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(-HR*0.5,cy-HR*0.7);ctx.lineTo(-HR*0.35,cy-HR*0.9);ctx.stroke();
  // ── 怒り眉（太く吊り上がる）──
  ctx.strokeStyle='#1a0e0e'; ctx.lineWidth=2.6; ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-HR*0.62,cy-HR*0.32);ctx.lineTo(-HR*0.12,cy-HR*0.08);ctx.stroke();
  ctx.beginPath();ctx.moveTo( HR*0.62,cy-HR*0.32);ctx.lineTo( HR*0.12,cy-HR*0.08);ctx.stroke();
  // ── 目（鋭い・黄色く光る怒り目）──
  ctx.fillStyle='#fff3c0';
  ctx.beginPath();ctxEllipse(ctx,-HR*0.38,cy+HR*0.12,HR*0.26,HR*0.20,-0.25,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctxEllipse(ctx, HR*0.38,cy+HR*0.12,HR*0.26,HR*0.20, 0.25,0,Math.PI*2);ctx.fill();
  // 瞳（黒・小さく鋭く）
  ctx.fillStyle='#1a0a0a';
  ctx.beginPath();ctx.arc(-HR*0.34,cy+HR*0.13,HR*0.12,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc( HR*0.34,cy+HR*0.13,HR*0.12,0,Math.PI*2);ctx.fill();
  // 瞳のハイライト
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-HR*0.30,cy+HR*0.08,HR*0.04,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc( HR*0.38,cy+HR*0.08,HR*0.04,0,Math.PI*2);ctx.fill();
  // ── 口（への字＋牙）──
  ctx.strokeStyle='#3a1410'; ctx.lineWidth=1.8; ctx.lineCap='round';
  ctx.beginPath();ctx.arc(0,cy+HR*0.72,HR*0.32,Math.PI*1.15,Math.PI*1.85);ctx.stroke();
  // 牙（左右・下向き白・少し大きめ）
  ctx.fillStyle='#fff';
  ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=0.6;
  ctx.beginPath();ctx.moveTo(-HR*0.3,cy+HR*0.48);ctx.lineTo(-HR*0.14,cy+HR*0.48);ctx.lineTo(-HR*0.22,cy+HR*0.78);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo( HR*0.3,cy+HR*0.48);ctx.lineTo( HR*0.14,cy+HR*0.48);ctx.lineTo( HR*0.22,cy+HR*0.78);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.shadowBlur=0;
}

function drawStick(cx,cy,dir,st,af,ifrm,skillLv,atkT,guardOn){
  // ダメージ点滅（防御成功中は点滅しない）
  if(ifrm>0 && p.guardEffect<=0 && Math.floor(fr/4)%2===1)return;

  // ── サイズ（やや頭身を上げたRPG風プロポーション）──
  var HR=11,   // 頭半径（チビ頭身＝フィギュア感）
      TH=14.5, // 胴の高さ
      LH=13,   // 足の長さ
      AH=10.5, // 腕の長さ
      BW=10;   // 胴の幅（半分）
  var waistY=-LH, shouldY=waistY-TH, headCY=shouldY-HR-1;

  // ── キャラ別カラー ──
  var ch=CHARS[selectedChar]||CHARS['KENTO'];
  var skinCol=ch.skin, hairCol=ch.hair, hairStyle=ch.hairStyle;
  var lv=Math.min(skillLv,5);
  var bodyCol=ch.body[lv], legCol=ch.leg[lv], bootCol=ch.boot[lv];
  // 服装スキン：装備中ならボディ色を上書き（ブリギッタ鬼は除外＝専用デザイン保持）
  if(typeof getOutfitSkin==='function' && selectedChar!=='women_3'){
    var ofSkin=getOutfitSkin();
    if(ofSkin && ofSkin.body){ bodyCol=ofSkin.body[lv]; }
  }
  var acc=ch.acc||'#cc2222';
  var OL='rgba(35,22,28,0.35)'; // ソフトな輪郭（線でなく陰影で形を作る）

  // 影の濃い版を作るヘルパー
  function shade(hex,f){
    if(!hex||typeof hex!=='string')hex='#888888'; // 安全策
    var h=hex.replace('#','');
    if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    var r=Math.round(parseInt(h.substr(0,2),16)*f);
    var g=Math.round(parseInt(h.substr(2,2),16)*f);
    var b=Math.round(parseInt(h.substr(4,2),16)*f);
    return 'rgb('+r+','+g+','+b+')';
  }
  // 角丸矩形パス
  function rr(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }
  // イージング
  function eoC(x){return 1-Math.pow(1-x,3);}      // easeOutCubic
  function eoQ(x){return 1-(1-x)*(1-x);}          // easeOutQuad
  // 円柱状グラデ（クレイ質感・共用ヘルパー委譲）
  function cyl(x0,x1,col){ return cylGrad(ctx,x0,x1,col); }
  // アウトライン付き塗り
  function fillOL(fn,col,ol){
    ctx.save();
    ctx.lineJoin='round';
    ctx.strokeStyle=ol||OL; ctx.lineWidth=1.2;
    fn(); ctx.stroke();
    ctx.fillStyle=col; fn(); ctx.fill();
    ctx.restore();
  }

  // ── モーション ──
  var legA=0, legAR=0, armA=0, bobY=0, atkProg=0, capeFlow=0;
  var lean=0, slashA=null, slashAlpha=0, bladeLag=0;
  if(st==='run'){
    var cyc=Math.sin(af*Math.PI*0.5);
    legA=cyc*0.5; legAR=-legA; armA=-cyc*0.32;
    bobY=Math.abs(cyc)*1.6; capeFlow=cyc*3;
    lean=0.09; // 走行時は前傾（疾走感）
  } else if(st==='jump'){
    legA=0.4; legAR=-0.2; armA=-0.6; bobY=-2; capeFlow=4;
    lean=0.05;
  } else if(st==='atk'){
    // ★3フェーズの自然なスイング：溜め→振り抜き→余韻
    atkProg=(atkT||0)/14;
    var t=1-atkProg; // 0→1で進行
    if(t<0.2){
      // 溜め（アンチシペーション：一瞬さらに振りかぶる）
      var w=eoQ(t/0.2);
      armA=-2.5-0.4*w; lean=-0.05*w; bladeLag=0.45;
    } else if(t<0.6){
      // 振り抜き（easeOutCubicで鋭く）
      var u=eoC((t-0.2)/0.4);
      armA=-2.9+4.3*u; lean=-0.05+0.21*u;
      bladeLag=0.45*(1-u); // 刃が遅れてしなる
      slashA=-2.2+3.3*u; slashAlpha=1-u*0.6; // 斬撃軌跡
    } else {
      // 余韻（少し戻して静止）
      var v=eoQ((t-0.6)/0.4);
      armA=1.4-0.2*v; lean=0.16*(1-v*0.6);
    }
    legA=0.25; legAR=-0.15; bobY=(t>0.2&&t<0.7)?-2:0; capeFlow=(t<0.6)?5:2;
  } else if(st==='guard'){
    legA=0.18; legAR=-0.18; bobY=1; capeFlow=1;
  } else {
    capeFlow=Math.sin(fr*0.05)*1.2; // アイドルは微風
    bobY=Math.sin(fr*0.07)*0.7;     // アイドルの呼吸
  }

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(dir, 1);
  if(lean)ctx.rotate(lean); // 足元を軸に前傾

  // 無敵グロー
  if(skillLv>=5 && (ifrm>0||p.invTimer>0)){
    ctx.shadowColor='#ffe44d'; ctx.shadowBlur=20;
  }

  // ═══ マント（LV2以上・背後にたなびく）═══
  if(skillLv>=2){
    ctx.save();
    var capeCol=acc;
    ctx.lineJoin='round';
    ctx.strokeStyle=OL; ctx.lineWidth=2.4;
    var capePath=function(){
      ctx.beginPath();
      ctx.moveTo(-BW*0.6,shouldY+2+bobY);
      ctx.quadraticCurveTo(-BW*1.4-capeFlow,shouldY+TH*0.5+bobY,-BW*1.2-capeFlow*1.4,waistY+8+bobY);
      ctx.quadraticCurveTo(-BW*0.5-capeFlow*0.7,waistY+4+bobY,0,waistY+2+bobY);
      ctx.lineTo(BW*0.3,shouldY+3+bobY);
      ctx.closePath();
    };
    capePath(); ctx.stroke();
    ctx.fillStyle=shade(capeCol,0.7); capePath(); ctx.fill();
    // マント内側の陰
    ctx.fillStyle=shade(capeCol,0.5);
    ctx.beginPath();
    ctx.moveTo(-BW*0.6,shouldY+2+bobY);
    ctx.quadraticCurveTo(-BW*0.9-capeFlow,shouldY+TH*0.5+bobY,-BW*0.7-capeFlow,waistY+6+bobY);
    ctx.lineTo(0,waistY+2+bobY);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // ═══ 旧ハイブリッド経路（上半身スプライト＋脚）は廃止。フルベクター＋頭部写真に一本化 ═══
  if(false && SPR_READY[selectedChar]){
    var im=SPR[selectedChar];
    var SH=50, SW=im.width*(SH/im.height);
    var sqx=1, sqy=1;
    if(st==='jump'){ sqx=0.94; sqy=1.08; }          // 空中＝伸び
    else if(st==='guard'){ sqx=1.06; sqy=0.93; }     // ガード＝踏ん張り
    else if(st==='atk' && atkProg<0.55){ sqx=1.05; sqy=0.97; } // 振り抜き＝前のめり
    var rock=(st==='run')?Math.sin(af*Math.PI*0.5)*0.055:0;     // 走り＝軽い揺れ

    // ★キャラ別の脚パラメータ（スプライトを持ち上げ、下に脚をベクター描画）
    // legColor=脚(ズボン/肌)の色, bootCol=靴, lift=スプライト持ち上げ量, hipW=腰幅
    var LEGDEF={
      men_0:{leg:'#caa84a',boot:'#7a5a28',lift:13,hipW:7},   // ルーベルト：黄ズボン
      men_1:{leg:'#3a3a44',boot:'#222',lift:15,hipW:9},      // バルト：黒ズボン
      men_2:{leg:'#6a5a3a',boot:'#4a3a22',lift:15,hipW:9},   // ジルヴェスター：茶
      men_3:{leg:'#4a4a8a',boot:'#333',lift:14,hipW:7},      // ユリアン：青ズボン
      women_0:{leg:'#e8c0c8',boot:'#c87890',lift:16,hipW:9}, // クララ：肌(スカート裾)
      women_1:{leg:'#e8d8c0',boot:'#d0a060',lift:16,hipW:9}, // エルザ：肌
      women_2:{leg:'#7a4a8a',boot:'#5a3a6a',lift:14,hipW:8}, // メルティ：紫
      women_3:{leg:'#caa090',boot:'#a06850',lift:16,hipW:8}  // ブリギッタ：肌
    };
    var LD=LEGDEF[selectedChar]||{leg:'#888',boot:'#555',lift:13,hipW:8};
    var spLift=LD.lift; // この分スプライトを上げ、下に脚を描く

    // ── 脚の動き（歩行で交互、ジャンプで畳む）──
    var legSwing=0, legSwingR=0, legBend=0;
    if(st==='run'){
      var cyc2=Math.sin(af*Math.PI);       // 歩行サイクル
      legSwing=cyc2*0.5; legSwingR=-cyc2*0.5;
    } else if(st==='jump'){
      legSwing=0.35; legSwingR=-0.25; legBend=0.3; // 空中で曲げる
    } else if(st==='guard'){
      legSwing=0.15; legSwingR=-0.15;      // 踏ん張り
    } else {
      var br=Math.sin(fr*0.07)*0.04; legSwing=br; legSwingR=-br; // アイドル呼吸
    }

    // ── 脚を描く関数（スプライト下端から下へ）──
    var legTopY = -spLift + 2;  // 脚の付け根Y（スプライト下端あたり）
    var legLen = spLift + 2;    // 脚の長さ（地面=原点まで）
    function drawLegPiece(ox, swing){
      ctx.save();
      ctx.translate(ox, legTopY);
      ctx.rotate(swing);
      // 太もも〜すね（ぷっくりカプセル）
      var lw=LD.hipW; // 脚の幅
      var lg=ctx.createLinearGradient(-lw/2,0,lw/2,0);
      lg.addColorStop(0,shadeCol(LD.leg,1.18));
      lg.addColorStop(0.5,LD.leg);
      lg.addColorStop(1,shadeCol(LD.leg,0.72));
      ctx.fillStyle=lg;
      ctx.strokeStyle=shadeCol(LD.leg,0.5); ctx.lineWidth=1;
      rr(-lw/2,0,lw,legLen*0.72,lw*0.45); ctx.fill(); ctx.stroke();
      // 靴（丸いつま先）
      var bw2=lw*1.15;
      var bg3=ctx.createLinearGradient(-bw2/2,0,bw2/2,0);
      bg3.addColorStop(0,shadeCol(LD.boot,1.2));
      bg3.addColorStop(0.5,LD.boot);
      bg3.addColorStop(1,shadeCol(LD.boot,0.7));
      ctx.fillStyle=bg3;
      rr(-bw2/2,legLen*0.62,bw2,legLen*0.4,bw2*0.42); ctx.fill(); ctx.stroke();
      // 靴のつま先ハイライト
      ctx.fillStyle='rgba(255,255,255,0.25)';
      rr(-bw2/2+1,legLen*0.66,bw2*0.4,legLen*0.14,2); ctx.fill();
      ctx.restore();
    }

    ctx.save();
    ctx.rotate(rock);
    ctx.scale(sqx,sqy);
    // 脚を先に描く（胴体スプライトの後ろ＝奥の脚→手前の脚は胴の後）
    var bobLift=Math.abs(bobY)*0.5;
    ctx.save(); ctx.translate(0,-bobLift);
    drawLegPiece(-LD.hipW*0.55, st==='run'?legSwingR:legSwingR); // 奥脚
    ctx.restore();
    // スプライト本体（持ち上げて脚の上に胴が来る）
    ctx.drawImage(im, -SW/2, -SH-bobLift-spLift, SW, SH);
    // 手前脚（胴の前）
    ctx.save(); ctx.translate(0,-bobLift);
    drawLegPiece(LD.hipW*0.55, legSwing);
    ctx.restore();
    ctx.restore();
    // ── 剣（共通描画：原点に縦置き）──
    function ovSword(lv2){
      // ★剣の進化：LV0-1=銀の短剣 / LV2-3=ブルーソード(青) / LV4+=光る巨大ブルーソード
      var blue=(lv2>=2);   // ソード以上は青い刃に進化
      var glow=(lv2>=4);   // レーザー以上は発光
      var sLen, wBlade, gripScale;
      if(lv2>=4){ sLen=36; wBlade=3.6; gripScale=1.35; }      // 巨大ブルーソード
      else if(lv2>=2){ sLen=30; wBlade=3.0; gripScale=1.15; } // ブルーソード
      else { sLen=20; wBlade=2.3; gripScale=1.0; }            // 初期の銀の短剣
      var bg2=ctx.createLinearGradient(-wBlade,0,wBlade,0);
      var swSkin=(typeof getSwordSkin==='function')?getSwordSkin():null;
      var useSkin=(swSkin && swSkin.id!=='silver');  // 銀=デフォルトはLV進化色を優先
      if(useSkin){
        // 装備した剣スキンの色（LV2+で濃く＝進化感）
        bg2.addColorStop(0,swSkin.blade[0]);
        bg2.addColorStop(0.45,swSkin.blade[1]);
        bg2.addColorStop(1,swSkin.blade[2]);
      } else if(blue){
        bg2.addColorStop(0,'#d6f3ff');
        bg2.addColorStop(0.45,'#5fb8f0');
        bg2.addColorStop(1,'#2160c8');  // 深い青
      } else {
        bg2.addColorStop(0,'#f2f5f8');
        bg2.addColorStop(0.5,'#cfd6dd');
        bg2.addColorStop(1,'#9aa3ac');
      }
      ctx.lineJoin='round';
      ctx.strokeStyle=useSkin?swSkin.blade[2]:(blue?'#163a8a':OL); ctx.lineWidth=1.2;
      ctx.beginPath();
      ctx.moveTo(-wBlade,0); ctx.lineTo(-wBlade*0.5,-sLen); ctx.lineTo(0,-sLen-3.5); ctx.lineTo(wBlade*0.5,-sLen); ctx.lineTo(wBlade,0);
      ctx.closePath(); ctx.stroke();
      ctx.fillStyle=bg2; ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.18)';
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-sLen-3.5); ctx.lineTo(wBlade*0.5,-sLen); ctx.lineTo(wBlade,0); ctx.closePath(); ctx.fill();
      // ブルーソード or スキン剣は中央に光の筋
      if(blue || useSkin){
        ctx.save();ctx.globalCompositeOperation='lighter';
        ctx.strokeStyle=useSkin?swSkin.streak:(glow?'rgba(180,235,255,0.9)':'rgba(170,220,255,0.55)');
        ctx.lineWidth=glow?2.6:1.6;
        ctx.beginPath();ctx.moveTo(0,-2);ctx.lineTo(0,-sLen-2);ctx.stroke();
        // 発光オーラ（LV4+ またはスキンのオーラ色）
        if(glow || (useSkin && swSkin.aura)){
          ctx.strokeStyle=(useSkin && swSkin.aura)?swSkin.aura:'rgba(120,200,255,0.4)';ctx.lineWidth=5;
          ctx.beginPath();ctx.moveTo(0,-2);ctx.lineTo(0,-sLen-2);ctx.stroke();
        }
        ctx.restore();
      }
      // 鍔（ソード以上で大きく＝金 / ブルーは銀青）
      var gw=4.5*gripScale;
      ctx.fillStyle=cylGrad(ctx,-gw,gw,blue?'#8fa8d8':'#b08030');
      rr(-gw,-0.8,gw*2,2.6,1.2); ctx.fill();
      ctx.fillStyle=cylGrad(ctx,-1.5,1.5,blue?'#3a4a78':'#6b4520');
      rr(-1.5,1.8,3,5.5*gripScale,1.5); ctx.fill();
    }
    // ── 非攻撃時：手元に構えた剣（状態ごとに角度アニメ）──
    if(st!=='atk'){
      var swR;
      if(st==='run')        swR=-0.62+Math.sin(af*Math.PI*0.5)*0.16; // 走り＝上下に揺れる
      else if(st==='jump')  swR=-1.0;                                 // 空中＝後ろに引く
      else if(st==='guard') swR=-1.3;                                 // ガード＝立てて構える
      else                  swR=-0.58+Math.sin(fr*0.05)*0.06;         // アイドル＝ゆらぎ
      // ガード中は盾を前面に出すため、剣は手元（進行方向と逆＝負X）に引く
      var swordX=(st==='guard')? -BW*0.55 : BW*0.5;
      ctx.save();
      ctx.translate(swordX, -LH-TH*0.40+bobY);
      ctx.rotate(swR);
      ovSword(skillLv);
      ctx.restore();
    }
    // ── 攻撃：剣スイング＋斬撃軌跡 ──
    if(st==='atk'){
      var shx=BW*0.4, shy=-LH-TH*0.62+bobY;
      ctx.save();
      ctx.translate(shx,shy);
      ctx.rotate(armA*0.85+0.9);
      ctx.translate(0,-AH*0.4);
      ovSword(skillLv);
      ctx.restore();
      if(slashA!==null){
        ctx.save();
        var sg=ctx.createRadialGradient(shx,shy,8,shx,shy,32);
        sg.addColorStop(0,'rgba(255,255,255,0)');
        sg.addColorStop(0.72,'rgba(255,255,255,'+(0.8*slashAlpha)+')');
        sg.addColorStop(1,'rgba(200,240,255,0)');
        ctx.strokeStyle=sg; ctx.lineWidth=7; ctx.lineCap='round';
        ctx.beginPath();
        ctx.arc(shx,shy,27,slashA-0.95,slashA+0.5);
        ctx.stroke();
        ctx.restore();
      }
    }
    // ── ガード：光の盾 ──
    if(guardOn){
      ctx.save();
      var gx=BW+9, gy=-LH-TH*0.5+bobY;  // 進行方向側の前面に大きく構える
      ctx.translate(gx,gy);
      // ★勇者の盾（ヒーターシールド型・大きくカッコよく）
      var SW2=20, SH2=26;  // 盾サイズ（旧15px円→大幅拡大）
      // 盾の形：上は四角、下は尖る（騎士の盾）
      function shieldPath(){
        ctx.beginPath();
        ctx.moveTo(-SW2,-SH2*0.5);
        ctx.lineTo(SW2,-SH2*0.5);
        ctx.lineTo(SW2,SH2*0.1);
        ctx.quadraticCurveTo(SW2,SH2*0.55,0,SH2*0.5);
        ctx.quadraticCurveTo(-SW2,SH2*0.55,-SW2,SH2*0.1);
        ctx.closePath();
      }
      // 外周の発光オーラ
      ctx.save();ctx.globalCompositeOperation='lighter';
      var aura=ctx.createRadialGradient(0,0,4,0,0,SW2*1.5);
      aura.addColorStop(0,'rgba(150,210,255,0.5)');
      aura.addColorStop(1,'rgba(120,180,255,0)');
      ctx.fillStyle=aura;ctx.beginPath();ctx.arc(0,0,SW2*1.5,0,Math.PI*2);ctx.fill();
      ctx.restore();
      // 盾の金属ベース（銀のグラデ）
      var sg2=ctx.createLinearGradient(-SW2,-SH2*0.5,SW2,SH2*0.5);
      sg2.addColorStop(0,'#e8eef5');
      sg2.addColorStop(0.5,'#aab8cc');
      sg2.addColorStop(1,'#6b7d96');
      ctx.lineJoin='round';
      ctx.strokeStyle='#3a4761'; ctx.lineWidth=2;
      shieldPath(); ctx.stroke();
      ctx.fillStyle=sg2; shieldPath(); ctx.fill();
      // 金の縁取り
      ctx.strokeStyle='#f0c850'; ctx.lineWidth=2.2;
      ctx.save();ctx.scale(0.82,0.82);shieldPath();ctx.stroke();ctx.restore();
      // 中央の十字紋章（青）
      ctx.fillStyle='#2160c8';
      ctx.fillRect(-2.2,-SH2*0.38,4.4,SH2*0.72);
      ctx.fillRect(-SW2*0.55,-2.2,SW2*1.1,4.4);
      // 紋章の光沢
      ctx.fillStyle='rgba(255,255,255,0.45)';
      ctx.fillRect(-2.2,-SH2*0.38,1.6,SH2*0.72);
      // 盾全体の上からのハイライト
      ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.beginPath();ctx.ellipse?0:0;
      ctxEllipse(ctx,-SW2*0.35,-SH2*0.28,SW2*0.4,SH2*0.18,-0.3,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    ctx.restore();
    return;
  }

  // ═══ 足（左右）═══
  function drawLegRPG(ox,rot){
    ctx.save();
    ctx.translate(ox,waistY+bobY); ctx.rotate(rot);
    // すね（ぷっくりカプセル状）
    fillOL(function(){rr(-4.5,0,9,LH*0.62,4);},cyl(-4.5,4.5,legCol));
    // ブーツ（丸いつま先のクレイ靴）
    fillOL(function(){rr(-5,LH*0.5,12,LH*0.55,4.5);},cyl(-5,7,bootCol));
    // つま先の艶
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.beginPath();ctx.arc(3.5,LH*0.72,2.2,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  drawLegRPG(-BW*0.4,legA);
  drawLegRPG(BW*0.4,legAR);

  // ═══ 左腕（奥）═══
  ctx.save();
  ctx.translate(BW*0.5,shouldY+5+bobY);  // 盾を持つ左手を前面（進行方向側）に回す
  var lrot=(st==='guard')?1.1:armA*0.6+0.2;
  ctx.rotate(lrot);
  fillOL(function(){rr(-3,-2,6,AH,3);},cyl(-3,3,shade(bodyCol,0.82)));
  // 手（グローブ）
  fillOL(function(){ctx.beginPath();ctx.arc(0,AH-2,3.6,0,Math.PI*2);},skillLv>=4?'#d8d8e0':skinCol);
  ctx.restore();

  // ═══ 盾（LV3以上・前面に構える）═══
  if(skillLv>=3){
    ctx.save();
    ctx.shadowBlur=0; ctx.shadowColor='transparent';  // 剣の青発光を盾に持ち込まない
    var shY=(st==='guard')?shouldY+TH*0.4+bobY:shouldY+TH*0.6+bobY;
    var shX=(st==='guard')?BW*1.35:BW*0.95;  // 進行方向側（前）に構える
    ctx.translate(shX,shY);
    if(st==='guard')ctx.scale(1.18,1.18);  // ガード中は盾を大きく構える
    // ★無敵(LV5)中だけ金色に光る。それ以外は発光なし（青く光らない）
    if(skillLv>=5&&(ifrm>0||p.invTimer>0)){ctx.shadowColor='#ffe44d';ctx.shadowBlur=16;}
    // 盾本体（装備した盾デザインで形が変わる）
    var shKind=(typeof equippedShield!=='undefined')?equippedShield:'normal';
    var shieldPath=function(){
      ctx.beginPath();
      if(shKind==='star'){
        // 星型
        for(var sp=0;sp<10;sp++){
          var rr2=(sp%2===0)?12:5;
          var ang=Math.PI/2*3+sp*Math.PI/5;
          var sxp=Math.cos(ang)*rr2, syp=Math.sin(ang)*rr2;
          if(sp===0)ctx.moveTo(sxp,syp);else ctx.lineTo(sxp,syp);
        }
        ctx.closePath();
      } else if(shKind==='heart'){
        // ハート型
        ctx.moveTo(0,-3);
        ctx.bezierCurveTo(-2,-11,-13,-8,-11,1);
        ctx.bezierCurveTo(-10,7,-3,11,0,14);
        ctx.bezierCurveTo(3,11,10,7,11,1);
        ctx.bezierCurveTo(13,-8,2,-11,0,-3);
        ctx.closePath();
      } else {
        // ノーマル（騎士の紋章盾）
        ctx.moveTo(-8,-11); ctx.lineTo(8,-11);
        ctx.lineTo(8,3); ctx.quadraticCurveTo(8,11,0,14);
        ctx.quadraticCurveTo(-8,11,-8,3); ctx.closePath();
      }
    };
    var shieldBase=(typeof bootCol!=='undefined'&&bootCol)?bootCol:'#7a6a5a';
    if(shKind==='star') shieldBase='#ffcc33';      // スターは金色
    else if(shKind==='heart') shieldBase='#ff5588'; // ハートはピンク
    fillOL(shieldPath, shieldBase);
    // 盾の縁（金属＝アクセント色）
    ctx.strokeStyle=(shKind==='star')?'#ff9900':(shKind==='heart')?'#cc2266':acc;
    ctx.lineWidth=2; shieldPath(); ctx.stroke();
    // 中央の紋章（ノーマルのみ）
    if(shKind==='normal'){
      ctx.fillStyle=acc;
      ctx.beginPath();ctx.moveTo(0,-7);ctx.lineTo(3,0);ctx.lineTo(0,7);ctx.lineTo(-3,0);ctx.closePath();ctx.fill();
    }
    // ハイライト
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.fillRect(-6,-9,3,8);
    ctx.restore();
  }

  // ═══ 胴体（鎧/服）═══
  ctx.save();
  // メイン胴（円柱グラデで丸みを表現）
  fillOL(function(){rr(-BW,shouldY+bobY,BW*2,TH,5.5);},cyl(-BW,BW,bodyCol));
  // 上面の艶＋AO（頭の落ち影が肩に落ちる）＋裾の落ち影
  ctx.save();
  ctx.beginPath();rr(-BW,shouldY+bobY,BW*2,TH,5);ctx.clip();
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.fillRect(-BW,shouldY+bobY,BW*2,3.5);
  var ao=ctx.createRadialGradient(0,shouldY+bobY,1,0,shouldY+bobY,BW*1.1);
  ao.addColorStop(0,'rgba(0,0,0,0.28)');
  ao.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ao;
  ctx.fillRect(-BW,shouldY+bobY,BW*2,8);
  ctx.fillStyle='rgba(0,0,0,0.14)';
  ctx.fillRect(-BW,waistY-3+bobY,BW*2,3);
  ctx.restore();
  // ベルト
  ctx.fillStyle=shade(acc,0.9);
  ctx.fillRect(-BW,waistY-4+bobY,BW*2,4);
  ctx.strokeStyle=OL;ctx.lineWidth=1.2;ctx.strokeRect(-BW,waistY-4+bobY,BW*2,4);
  // バックル
  ctx.fillStyle='#ffd84d';
  fillOL(function(){rr(-3,waistY-4.5+bobY,6,5,1.5);},'#ffd84d');

  // LV4+：胸当て（プレートアーマー）
  if(skillLv>=4){
    ctx.fillStyle='rgba(220,225,235,0.85)';
    fillOL(function(){
      ctx.beginPath();
      ctx.moveTo(-BW*0.7,shouldY+2+bobY);
      ctx.lineTo(BW*0.7,shouldY+2+bobY);
      ctx.lineTo(BW*0.5,shouldY+TH*0.55+bobY);
      ctx.lineTo(0,shouldY+TH*0.7+bobY);
      ctx.lineTo(-BW*0.5,shouldY+TH*0.55+bobY);
      ctx.closePath();
    },'rgba(210,216,228,0.9)');
    // 胸の紋章
    ctx.fillStyle=acc;
    ctx.beginPath();ctx.arc(0,shouldY+TH*0.3+bobY,2.5,0,Math.PI*2);ctx.fill();
  } else if(skillLv>=1){
    // 服の縦ライン
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(0,shouldY+4+bobY);ctx.lineTo(0,waistY-3+bobY);ctx.stroke();
  }
  // LV5：金の肩当て
  if(skillLv>=5){
    ctx.fillStyle='#ffe44d';
    fillOL(function(){ctx.beginPath();ctx.arc(-BW,shouldY+3+bobY,4,0,Math.PI*2);},'#ffe44d');
    fillOL(function(){ctx.beginPath();ctx.arc(BW,shouldY+3+bobY,4,0,Math.PI*2);},'#ffe44d');
  }
  ctx.restore();

  // ═══ 斬撃の軌跡（振り抜き中だけ白い弧が走る）═══
  if(st==='atk' && slashA!==null){
    ctx.save();
    ctx.translate(BW*0.55,shouldY+5+bobY);
    var slR=AH+(skillLv>=2?44:30)-4;
    var sg=ctx.createRadialGradient(0,0,slR*0.3,0,0,slR);
    sg.addColorStop(0,'rgba(255,255,255,0)');
    sg.addColorStop(0.72,'rgba(255,255,255,'+(0.30*slashAlpha).toFixed(3)+')');
    sg.addColorStop(1,'rgba(190,235,255,'+(0.55*slashAlpha).toFixed(3)+')');
    ctx.fillStyle=sg;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,slR,slashA-1.15,slashA);
    ctx.closePath();ctx.fill();
    // 軌跡の先端エッジ
    ctx.strokeStyle='rgba(255,255,255,'+(0.75*slashAlpha).toFixed(3)+')';
    ctx.lineWidth=2.2;ctx.lineCap='round';
    ctx.beginPath();ctx.arc(0,0,slR-1.5,slashA-0.85,slashA);ctx.stroke();
    ctx.restore();
  }

  // ═══ 右腕＋剣（手前）═══
  ctx.save();
  // ガード中は盾を前面に出すため、剣の手を手元（やや後ろ）に引く
  var rArmX=(st==='guard')? BW*0.15 : BW*0.55;
  ctx.translate(rArmX,shouldY+5+bobY);
  ctx.rotate(-armA);
  fillOL(function(){rr(-3,-2,6,AH,3);},cyl(-3,3,bodyCol));
  // 手
  fillOL(function(){ctx.beginPath();ctx.arc(0,AH-1,3.6,0,Math.PI*2);},skillLv>=4?'#d8d8e0':skinCol);
  // 剣
  ctx.save();
  ctx.translate(0,AH-1);
  var sAngle=(st==='atk')?(armA+Math.PI*0.5+bladeLag):((st==='guard')?-0.15:0.5);
  ctx.rotate(sAngle);
  var sLen=skillLv>=2?44:30;
  var up=skillLv>=2;
  var _sw=(typeof getSwordSkin==='function')?getSwordSkin():null;
  var _useSk=(_sw && _sw.id!=='silver');
  if(_useSk){ctx.shadowColor=(_sw.aura||'#33bbff').replace(/[\d.]+\)$/,'0.9)');ctx.shadowBlur=(st==='atk')?22:11;}
  else if(up){ctx.shadowColor='#33bbff';ctx.shadowBlur=(st==='atk')?22:10;}
  // 柄（茶色グリップ＋柄頭）
  fillOL(function(){rr(-2,2,4,8,2);},cyl(-2,2,'#6b4520'));
  ctx.fillStyle=sphGrad(ctx,0,10.5,2.4,'#8a5a28');
  ctx.beginPath();ctx.arc(0,10.5,2.4,0,Math.PI*2);ctx.fill();
  // 鍔（金茶のクロスガード）
  fillOL(function(){rr(-6.5,-1.2,13,3.8,1.8);},cyl(-6.5,6.5,up?acc:'#b08030'));
  // 刀身（ひし形・グラデ）
  var bladePath=function(){
    ctx.beginPath();
    ctx.moveTo(-3.5,-1);
    ctx.lineTo(-4.5,-sLen*0.5);
    ctx.lineTo(0,-sLen);
    ctx.lineTo(4.5,-sLen*0.5);
    ctx.lineTo(3.5,-1);
    ctx.closePath();
  };
  ctx.lineJoin='round';ctx.strokeStyle=OL;ctx.lineWidth=2;bladePath();ctx.stroke();
  var bg2=ctx.createLinearGradient(-4,0,4,0);
  var swSkin=(typeof getSwordSkin==='function')?getSwordSkin():null;
  var useSkin=(swSkin && swSkin.id!=='silver');
  if(useSkin){
    // 装備した剣スキンの色（中央を明るく＝刃のツヤ）
    bg2.addColorStop(0,swSkin.blade[2]);bg2.addColorStop(0.5,swSkin.blade[0]);bg2.addColorStop(1,swSkin.blade[2]);
  } else if(up){bg2.addColorStop(0,'#1a88cc');bg2.addColorStop(0.5,'#9be3ff');bg2.addColorStop(1,'#1a88cc');}
  else{bg2.addColorStop(0,'#9a9a8a');bg2.addColorStop(0.5,'#f0ecd8');bg2.addColorStop(1,'#9a9a8a');}
  ctx.fillStyle=bg2;bladePath();ctx.fill();
  // ★二面ベベル：右面を暗くして金属の稜線を出す
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.moveTo(0,-1);ctx.lineTo(0,-sLen);
  ctx.lineTo(4.5,-sLen*0.5);ctx.lineTo(3.5,-1);
  ctx.closePath();ctx.fill();
  // 左面のハイライト（光が当たる面）
  ctx.strokeStyle=up?'rgba(220,250,255,0.95)':'rgba(255,255,255,0.85)';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(-1.8,-3);ctx.lineTo(-0.8,-sLen+4);ctx.stroke();
  ctx.restore();
  ctx.restore();

  // ═══ 頭 ═══
  ctx.save();
  // 首
  ctx.fillStyle=shade(skinCol,0.74); // 首は頭の落ち影で暗く（立体の説得力）
  ctx.fillRect(-3.5,shouldY-3+bobY,7,5);
  if(selectedChar==='women_3'){
    // ── ブリギッタ：鬼の顔（ベクター・頭部写真の見切れ回避＋キャラ性）──
    drawOniHead(ctx, HR, headCY+bobY, skinCol, hairCol, skillLv, ifrm, fillOL, shade, sphGrad);
  } else if(HEAD_READY[selectedChar]){
    // ── フィギュア頭部写真（顔＋髪＋王冠/メガネ）を配置 ──
    // 方式：高さ基準で頭サイズを統一し、あご(chinY)を肩ライン(shouldY)に乗せる
    var hd=HEAD[selectedChar], hm=HEAD_META[selectedChar];
    var hcfg=HEADCFG[selectedChar]||{s:1,oy:0};
    var headH=HR*3.4*(hcfg.s||1);                  // 頭の描画高さ（チビ頭身でデカめ・統一）
    var hsc=headH/hm.h;
    var hdw=hm.w*hsc, hdh=hm.h*hsc;
    var hdx=-(hm.cx*hsc);                           // 顔中心Xを0に
    var hdy=(shouldY+bobY+2)-(hm.chinY*hsc)+(hcfg.oy||0); // あごを肩のすぐ上に
    if(skillLv>=5&&(ifrm>0||p.invTimer>0)){ctx.shadowColor='#ffe44d';ctx.shadowBlur=14;}
    // ★頭部写真の下端（首・余白）が体にハミ出て四角く見切れるのを防ぐ：
    //   肩ラインの少し下でクリップし、首から下は体（胴体）が隠す
    ctx.save();
    var clipBottom=shouldY+bobY+4;                  // 肩のすぐ下までで頭部写真を切る
    ctx.beginPath();
    ctx.rect(hdx-2, hdy-2, hdw+4, (clipBottom-hdy)+2);
    ctx.clip();
    ctx.drawImage(hd, hdx, hdy, hdw, hdh);
    ctx.restore();
  } else {
    // ── フォールバック：ベクター顔（頭部画像が未ロードのとき）──
    fillOL(function(){ctx.beginPath();ctx.arc(0,headCY+bobY,HR,0,Math.PI*2);},sphGrad(ctx,0,headCY+bobY,HR,skinCol));
    ctx.save();
    ctx.beginPath();ctx.arc(0,headCY+bobY,HR,0,Math.PI*2);ctx.clip();
    ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.6;
    ctx.beginPath();ctx.arc(0,headCY+bobY,HR-1.5,Math.PI*1.05,Math.PI*1.55);ctx.stroke();
    ctx.restore();
    drawHairStyle(ctx, hairStyle, hairGrad(ctx,headCY+bobY,HR,hairCol), HR, headCY+bobY);
    if(hairStyle==='wom_perm'){
      ctx.fillStyle=sphGrad(ctx,0,headCY+bobY+HR*0.05,HR*0.72,skinCol);
      ctx.beginPath();ctx.arc(0,headCY+bobY+HR*0.05,HR*0.72,0,Math.PI*2);ctx.fill();
    }
    hairGloss(ctx,headCY+bobY,HR);
    figEyes(ctx,HR,headCY+bobY);
    ctx.strokeStyle=shade(hairCol,0.7);ctx.lineWidth=1.3;
    if(selectedChar==='men_1'){
      ctx.beginPath();ctx.moveTo(-HR*0.55,headCY+bobY-HR*0.38);ctx.lineTo(-HR*0.12,headCY+bobY-HR*0.26);ctx.stroke();
      ctx.beginPath();ctx.moveTo( HR*0.55,headCY+bobY-HR*0.38);ctx.lineTo( HR*0.12,headCY+bobY-HR*0.26);ctx.stroke();
    } else {
      ctx.beginPath();ctx.moveTo(-HR*0.52,headCY+bobY-HR*0.36);ctx.lineTo(-HR*0.14,headCY+bobY-HR*0.32);ctx.stroke();
      ctx.beginPath();ctx.moveTo( HR*0.52,headCY+bobY-HR*0.36);ctx.lineTo( HR*0.14,headCY+bobY-HR*0.32);ctx.stroke();
    }
    ctx.strokeStyle='#9a5540';ctx.lineWidth=1.2;
    if(selectedChar==='men_1'){
      ctx.beginPath();ctx.moveTo(-HR*0.22,headCY+bobY+HR*0.32);ctx.lineTo(HR*0.22,headCY+bobY+HR*0.32);ctx.stroke();
    } else {
      ctx.beginPath();ctx.arc(0,headCY+bobY+HR*0.22,HR*0.24,0.25,Math.PI-0.25);ctx.stroke();
    }
    if(selectedChar==='men_3'){
      ctx.strokeStyle='#222';ctx.lineWidth=1.2;
      ctx.beginPath();ctx.arc(-HR*0.32,headCY+bobY-HR*0.05,HR*0.28,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc( HR*0.34,headCY+bobY-HR*0.05,HR*0.28,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-HR*0.04,headCY+bobY-HR*0.05);ctx.lineTo(HR*0.06,headCY+bobY-HR*0.05);ctx.stroke();
    }
    if(selectedChar==='men_0'||selectedChar==='men_2'||selectedChar.indexOf('women')===0){
      ctx.fillStyle='rgba(255,150,150,0.3)';
      ctx.beginPath();ctx.arc(-HR*0.5,headCY+bobY+HR*0.18,HR*0.18,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc( HR*0.55,headCY+bobY+HR*0.18,HR*0.18,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.restore();

  ctx.restore();
}


// ===== 描画 =====
function draw(){
  // カメラシェイク
  ctx.save();
  if(shake>0.3){
    var sx=(Math.random()-0.5)*shake;
    var sy=(Math.random()-0.5)*shake;
    ctx.translate(sx,sy);
  }
  // ===== 背景（レベル別テーマ）=====
  if(level===1){
    // LV1：昼の草原・多層パララックスで立体的な奥行き
    // ① 空（柔らかな上→下グラデ＋上空のほのかな光）
    var skyG=ctx.createLinearGradient(0,0,0,H);
    skyG.addColorStop(0,'#4aa8ee');skyG.addColorStop(0.55,'#7fc8f5');skyG.addColorStop(1,'#d6f0ff');
    ctx.fillStyle=skyG;ctx.fillRect(0,0,W,H);
    // ② 太陽（やわらかい光輪）
    var sunX=64,sunY=52;
    var sunG=ctx.createRadialGradient(sunX,sunY,6,sunX,sunY,60);
    sunG.addColorStop(0,'rgba(255,248,200,0.9)');sunG.addColorStop(0.3,'rgba(255,228,120,0.5)');sunG.addColorStop(1,'rgba(255,228,120,0)');
    ctx.fillStyle=sunG;ctx.beginPath();ctx.arc(sunX,sunY,60,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff3b0';ctx.beginPath();ctx.arc(sunX,sunY,20,0,Math.PI*2);ctx.fill();
    // ③ 最遠景：青く霞む山脈（パララックス最小 cam*0.04）
    var mtnBase=GROUND-30;
    for(var L1=0;L1<2;L1++){
      ctx.fillStyle=L1===0?'rgba(150,195,225,0.55)':'rgba(120,175,210,0.65)';
      var off=L1*130;
      for(var mi1=0;mi1<6;mi1++){
        var mx1=((mi1*260+off-cam*(0.04+L1*0.02))%(W+520)+W+520)%(W+520)-260;
        var mh1=70+((mi1*53+L1*40)%60);
        ctx.beginPath();
        ctx.moveTo(mx1-130,mtnBase);
        ctx.quadraticCurveTo(mx1-60,mtnBase-mh1*0.7,mx1,mtnBase-mh1);
        ctx.quadraticCurveTo(mx1+60,mtnBase-mh1*0.7,mx1+130,mtnBase);
        ctx.closePath();ctx.fill();
      }
    }
    // ④ 遠い雲（小さく薄く・ゆっくり cam*0.06＋自走）
    ctx.fillStyle='rgba(255,255,255,0.55)';
    for(var ci0=0;ci0<3;ci0++){
      var cxa=((ci0*240+fr*0.18-cam*0.06)%(W+200)+W+200)%(W+200)-100;
      var cya=40+ci0*22;
      ctx.beginPath();ctxEllipse(ctx,cxa,cya,30,11,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctxEllipse(ctx,cxa+20,cya-6,20,9,0,0,Math.PI*2);ctx.fill();
    }
    // ⑤ 中景：なだらかな緑の丘（陰影付き・立体 cam*0.13）
    for(var hi=0;hi<6;hi++){
      var hx=((hi*230-cam*0.13)%(W+460)+W+460)%(W+460)-230;
      var hr=110+(hi*37%50);
      // 丘本体
      var hg=ctx.createLinearGradient(hx,GROUND-hr,hx,GROUND+20);
      hg.addColorStop(0,'#8fd06a');hg.addColorStop(1,'#5aa83e');
      ctx.fillStyle=hg;
      ctx.beginPath();ctx.arc(hx,GROUND+20,hr,Math.PI,0);ctx.fill();
      // 丘の右側に陰（立体感）
      ctx.fillStyle='rgba(40,110,40,0.25)';
      ctx.beginPath();ctx.arc(hx,GROUND+20,hr,Math.PI*1.6,0);ctx.fill();
      // 丘のてっぺんハイライト
      ctx.fillStyle='rgba(200,255,180,0.4)';
      ctx.beginPath();ctx.arc(hx-hr*0.3,GROUND+20,hr*0.92,Math.PI*1.15,Math.PI*1.45);ctx.fill();
    }
    // ⑥ 近景：立体的な木立（丸い樹冠＋幹＋陰 cam*0.28）
    for(var ti2=0;ti2<5;ti2++){
      var tx2=((ti2*320+90-cam*0.28)%(W+640)+W+640)%(W+640)-320;
      var ty2=GROUND-6, trH=26;
      // 幹
      ctx.fillStyle='#7a4a28';ctx.fillRect(tx2-4,ty2-trH,8,trH);
      ctx.fillStyle='rgba(0,0,0,0.18)';ctx.fillRect(tx2+1,ty2-trH,3,trH);
      // 樹冠（3つの円で雲状＋陰影）
      var crownY=ty2-trH-10;
      var cg=ctx.createRadialGradient(tx2-6,crownY-6,4,tx2,crownY,30);
      cg.addColorStop(0,'#6fc04a');cg.addColorStop(1,'#3a8a2a');
      ctx.fillStyle=cg;
      ctx.beginPath();ctx.arc(tx2-14,crownY+4,16,0,Math.PI*2);
      ctx.arc(tx2+14,crownY+4,16,0,Math.PI*2);
      ctx.arc(tx2,crownY-8,19,0,Math.PI*2);ctx.fill();
      // 樹冠ハイライト
      ctx.fillStyle='rgba(190,240,150,0.45)';
      ctx.beginPath();ctx.arc(tx2-6,crownY-12,7,0,Math.PI*2);ctx.fill();
    }
    // ⑦ 前景の茂み（地面手前で速く流れる cam*0.55）
    for(var bi=0;bi<7;bi++){
      var bx=((bi*180+40-cam*0.55)%(W+360)+W+360)%(W+360)-180;
      var bg3=ctx.createLinearGradient(bx,GROUND-14,bx,GROUND+6);
      bg3.addColorStop(0,'#4fa83a');bg3.addColorStop(1,'#2d7a22');
      ctx.fillStyle=bg3;
      ctx.beginPath();
      ctx.arc(bx-10,GROUND+2,11,Math.PI,0);
      ctx.arc(bx+2,GROUND+2,14,Math.PI,0);
      ctx.arc(bx+14,GROUND+2,10,Math.PI,0);
      ctx.fill();
    }

  } else if(level===2){
    // LV2：夕暮れ・オレンジ空・少し緊張感
    var skyG2=ctx.createLinearGradient(0,0,0,H);
    skyG2.addColorStop(0,'#1a1a3e');skyG2.addColorStop(0.5,'#c84b11');skyG2.addColorStop(1,'#ff9a3c');
    ctx.fillStyle=skyG2;ctx.fillRect(0,0,W,H);
    // 星（少し見える）
    for(var si=0;si<20;si++){
      var sx2=(Math.sin(si*137.5)*.5+.5)*W;
      var sy2=(Math.cos(si*97.3)*.5+.5)*(H*.4);
      ctx.globalAlpha=0.1+Math.sin(fr*.04+si)*.35;
      ctx.fillStyle='#fff';ctx.fillRect(Math.floor(sx2),Math.floor(sy2),2,2);
    }
    ctx.globalAlpha=1;
    // 夕日
    ctx.fillStyle='#ffcc44';ctx.shadowColor='#ff8800';ctx.shadowBlur=30;
    ctx.beginPath();ctx.arc(W-60,GROUND-20,28,Math.PI,0);ctx.fill();
    ctx.shadowBlur=0;
    // 薄暗い山シルエット
    ctx.fillStyle='rgba(40,10,0,0.7)';
    for(var mi=0;mi<5;mi++){
      var mx=((mi*200-cam*0.12)%(W+200)+W+200)%(W+200)-100;
      var mh=60+mi*20%50;
      ctx.beginPath();ctx.moveTo(mx,GROUND);ctx.lineTo(mx+100,GROUND-mh);ctx.lineTo(mx+200,GROUND);ctx.fill();
    }

  } else if(level===3){
    // LV3：夜の山岳・暗め・緊張感高まる
    var skyG3=ctx.createLinearGradient(0,0,0,H);
    skyG3.addColorStop(0,'#050510');skyG3.addColorStop(1,'#1a1040');
    ctx.fillStyle=skyG3;ctx.fillRect(0,0,W,H);
    // 星（たくさん）
    for(var si3=0;si3<50;si3++){
      var sx3=(Math.sin(si3*137.5)*.5+.5)*W;
      var sy3=(Math.cos(si3*97.3)*.5+.5)*(H*.6);
      ctx.globalAlpha=0.2+Math.sin(fr*.05+si3)*.5;
      ctx.fillStyle='#fff';ctx.fillRect(Math.floor(sx3),Math.floor(sy3),si3%5===0?2:1,si3%5===0?2:1);
    }
    ctx.globalAlpha=1;
    // 月
    ctx.fillStyle='#fffde0';ctx.shadowColor='#ffffaa';ctx.shadowBlur=18;
    ctx.beginPath();ctx.arc(W-55,40,20,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#050510';ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(W-46,35,15,0,Math.PI*2);ctx.fill();
    // 険しい山
    ctx.fillStyle='rgba(15,10,40,0.8)';
    for(var mi3=0;mi3<6;mi3++){
      var mx3=((mi3*160-cam*0.15)%(W+160)+W+160)%(W+160)-80;
      var mh3=65+mi3*25%55;
      ctx.beginPath();ctx.moveTo(mx3,GROUND);ctx.lineTo(mx3+80,GROUND-mh3);ctx.lineTo(mx3+160,GROUND);ctx.fill();
    }

  } else if(level===4){
    // LV4：溶岩・地下洞窟・赤黒い危険な雰囲気
    var skyG4=ctx.createLinearGradient(0,0,0,H);
    skyG4.addColorStop(0,'#0a0000');skyG4.addColorStop(0.7,'#1a0500');skyG4.addColorStop(1,'#3a0800');
    ctx.fillStyle=skyG4;ctx.fillRect(0,0,W,H);
    // 溶岩の光（下から揺らめく赤い光）
    var lavaGlow=ctx.createRadialGradient(W/2,H,0,W/2,H,200);
    lavaGlow.addColorStop(0,'rgba(255,60,0,0.35)');
    lavaGlow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=lavaGlow;ctx.fillRect(0,0,W,H);
    // 飛び散る火の粉
    for(var fi2=0;fi2<18;fi2++){
      var ft=(fr*0.8+fi2*23)%120;
      var fx2=((fi2*137+cam*0.1)%W);
      var fy2=GROUND-ft*2.5;
      if(fy2<0) continue;
      ctx.globalAlpha=(1-ft/120)*0.7;
      ctx.fillStyle=fi2%3===0?'#ff6600':fi2%3===1?'#ffcc00':'#ff2200';
      ctx.beginPath();ctx.arc(fx2,fy2,1.5,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    // 鍾乳石（天井から）
    ctx.fillStyle='rgba(40,5,0,0.8)';
    for(var di=0;di<7;di++){
      var dx=((di*170-cam*0.2)%(W+170)+W+170)%(W+170)-85;
      var dh=25+di*12%30;
      ctx.beginPath();ctx.moveTo(dx,0);ctx.lineTo(dx-12,dh);ctx.lineTo(dx+12,dh);ctx.fill();
    }

  } else {
    // LV5：深宇宙・最終決戦・黒紫・威圧感MAX
    var skyG5=ctx.createLinearGradient(0,0,0,H);
    skyG5.addColorStop(0,'#000000');skyG5.addColorStop(0.5,'#0d0020');skyG5.addColorStop(1,'#1a0035');
    ctx.fillStyle=skyG5;ctx.fillRect(0,0,W,H);
    // 星雲（大きな光の塊）
    ctx.fillStyle='rgba(80,0,120,0.12)';
    ctx.beginPath();ctxEllipse(ctx,W*0.3,H*0.3,100,60,0.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(0,60,120,0.1)';
    ctx.beginPath();ctxEllipse(ctx,W*0.7,H*0.2,80,50,-0.3,0,Math.PI*2);ctx.fill();
    // 星（密度高・色付き）
    for(var si5=0;si5<70;si5++){
      var sx5=(Math.sin(si5*137.5)*.5+.5)*W;
      var sy5=(Math.cos(si5*97.3)*.5+.5)*(H*.75);
      var sc=['#fff','#ffccff','#ccccff','#ff88ff'][si5%4];
      ctx.globalAlpha=0.15+Math.sin(fr*.04+si5)*.5;
      ctx.fillStyle=sc;ctx.fillRect(Math.floor(sx5),Math.floor(sy5),si5%7===0?2:1,si5%7===0?2:1);
    }
    ctx.globalAlpha=1;
    // 不気味な惑星
    ctx.fillStyle='#220033';ctx.shadowColor='#8800cc';ctx.shadowBlur=25;
    ctx.beginPath();ctx.arc(80,55,30,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(150,0,200,0.15)';
    ctx.beginPath();ctxEllipse(ctx,80,55,55,12,0,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // 稲妻のような亀裂
    if(fr%90<3){
      ctx.strokeStyle='rgba(180,0,255,0.6)';ctx.lineWidth=1.5;
      ctx.beginPath();
      var lx5=Math.random()*W;
      ctx.moveTo(lx5,0);ctx.lineTo(lx5+20,60);ctx.lineTo(lx5-10,120);ctx.lineTo(lx5+15,180);
      ctx.stroke();
    }
  }

  // ===== 背景テーマ着色（アンロックした背景で雰囲気チェンジ）=====
  if(equippedBG!=='grass'){
    var th=getBGTheme();
    // 空エリア（地面より上）にテーマグラデを重ねて雰囲気を変える
    var tg=ctx.createLinearGradient(0,0,0,GROUND);
    tg.addColorStop(0,'rgba('+hexToRgb(th.sky[0])+',0.78)');
    tg.addColorStop(0.55,'rgba('+hexToRgb(th.sky[1])+',0.62)');
    tg.addColorStop(1,'rgba('+hexToRgb(th.sky[2])+',0.30)');
    ctx.fillStyle=tg; ctx.fillRect(0,0,W,GROUND);
    // 夜は星を散らす
    if(equippedBG==='night'){
      ctx.fillStyle='rgba(255,255,255,0.85)';
      for(var st=0;st<24;st++){
        var stx=((st*167+fr*0.05)%(W+40))-20;
        var sty=(st*97)%(GROUND-90)+10;
        var tw=0.6+Math.abs(Math.sin(fr*0.03+st))*1.2;
        ctx.globalAlpha=0.4+Math.abs(Math.sin(fr*0.04+st*1.7))*0.5;
        ctx.fillRect(stx,sty,tw,tw);
      }
      ctx.globalAlpha=1;
    }
    // 雪は舞う雪片
    if(equippedBG==='snow'){
      ctx.fillStyle='rgba(255,255,255,0.9)';
      for(var sf=0;sf<30;sf++){
        var sfx=((sf*131+fr*0.4)%(W+30))-15;
        var sfy=((sf*83+fr*1.1)%(GROUND-20));
        ctx.beginPath();ctx.arc(sfx,sfy,1.3+((sf*7)%2),0,Math.PI*2);ctx.fill();
      }
    }
  }
  // 足場・地面
  for(var ti=0;ti<tiles.length;ti++){
    var t=tiles[ti];
    var tx=t.x-cam;
    if(tx>W+60||tx+t.w<-60)continue;
    if(t.goal){
      // ゴールポール
      ctx.fillStyle='#888';ctx.fillRect(tx,t.y,4,t.h);
      // 旗
      ctx.fillStyle='#ff4444';
      ctx.beginPath();ctx.moveTo(tx+4,t.y);ctx.lineTo(tx+28,t.y+10);ctx.lineTo(tx+4,t.y+20);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='bold 9px monospace';
      ctx.fillText('GOAL',tx-10,t.y-5);
    } else if(t.g){
      // 地面本体（軽量：単色＋下部陰影バンド）
      var gndCol =['#2d6a4f','#3a4a20','#1a2a40','#3a0800','#0d0020'][level-1];
      var gndBot =['#1a4030','#252f12','#0e1825','#200400','#060010'][level-1];
      var topCol =['#52b788','#6a8a30','#3a5a80','#882200','#440088'][level-1];
      var topLit =['#6dd89e','#8aad44','#5278a8','#aa3311','#5a22aa'][level-1];
      ctx.fillStyle=gndCol;ctx.fillRect(tx,t.y,t.w,H-(t.y)+2);
      // 下部に陰影バンド（奥行き感・グラデの代わり）
      ctx.fillStyle=gndBot;ctx.fillRect(tx,t.y+40,t.w,H-(t.y)-38);
      // 草・表面（明るいハイライトライン付き）
      ctx.fillStyle=topCol;ctx.fillRect(tx,t.y,t.w,5);
      ctx.fillStyle=topLit;ctx.fillRect(tx,t.y,t.w,2);
      // 草の毛先（LV1-2のみ）
      if(level<=2){
        ctx.fillStyle=topCol;
        for(var gr=0;gr<t.w;gr+=8){
          var gh2=3+((tx+gr)%3);
          ctx.beginPath();
          ctx.moveTo(tx+gr,t.y);ctx.lineTo(tx+gr+2,t.y-gh2);ctx.lineTo(tx+gr+4,t.y);
          ctx.fill();
        }
      }
    } else if(t.side){
      // 段差崖面
      ctx.fillStyle='#1a4a30';ctx.fillRect(tx,t.y,t.w,t.h);
      ctx.fillStyle='#0d2a1a';ctx.fillRect(tx+1,t.y,t.w-2,t.h);
    } else {
      // 浮き台（軽量：単色＋下部陰影）
      var platCol=['#7a5533','#5a6a20','#2a4060','#661100','#330066'][level-1];
      var platDk =['#5a3d22','#404a14','#1c2c44','#440a00','#220044'][level-1];
      var platTop=['#9b7a55','#8aaa40','#4a70a0','#991a00','#660099'][level-1];
      ctx.fillStyle=platCol;ctx.fillRect(tx,t.y,t.w,t.h);
      ctx.fillStyle=platDk;ctx.fillRect(tx,t.y+t.h*0.55,t.w,t.h*0.45);
      ctx.fillStyle=platTop;ctx.fillRect(tx,t.y,t.w,3);
      // 縁のハイライト
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(tx,t.y,t.w,1);
      // 影（下に落ちる）
      ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(tx,t.y+t.h,t.w,3);
    }
  }

  // ゴールまでのプログレスバー
  var prog=Math.min(1,Math.max(0,(p.x-50)/(GOAL_X-50)));
  ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(10,H-8,W-20,5);
  ctx.fillStyle='#ffe44d';ctx.fillRect(10,H-8,(W-20)*prog,5);
  ctx.fillStyle='#fff';ctx.font='8px monospace';
  ctx.fillText('GOAL',W-30,H-9);

  // コイン
  for(var ci=0;ci<cins.length;ci++){
    var c=cins[ci];if(c.got)continue;
    var cx2=c.x-cam;if(cx2<-20||cx2>W+20)continue;
    var by=Math.sin(fr*.1+c.bob)*4;
    // コインの回転アニメ（xScaleで扁平→丸→扁平を繰り返す）
    var spin=Math.abs(Math.cos(fr*.08+c.bob));// 0〜1
    var coinW=Math.max(2,9*spin); // 回転で幅が変わる
    var coinH=11;
    ctx.save();
    ctx.translate(cx2+7, c.y+7+by);
    // グロー
    ctx.shadowColor='#ffe44d';ctx.shadowBlur=8;
    // コイン本体（楕円で3D感）
    ctx.fillStyle='#ffe44d';
    ctx.beginPath();ctxEllipse(ctx,0,0,coinW,coinH,0,0,Math.PI*2);ctx.fill();
    // 側面（回転中）
    if(spin>0.15){
      ctx.fillStyle='#f0b800';
      ctx.beginPath();ctxEllipse(ctx,0,0,coinW*0.6,coinH,0,0,Math.PI*2);ctx.fill();
      // ハイライト
      ctx.fillStyle='#fff8aa';
      ctx.beginPath();ctxEllipse(ctx,-coinW*0.25,-coinH*0.3,coinW*0.25,coinH*0.3,0,0,Math.PI*2);ctx.fill();
    }
    // 正面向き時は「$」マーク
    if(spin>0.6){
      ctx.fillStyle='#c8a800';
      ctx.font='bold '+(coinH*0.9)+'px monospace';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('$',0,1);
    }
    ctx.shadowBlur=0;
    ctx.restore();
  }

  // 敵
  for(var ei=0;ei<enms.length;ei++){
    var e=enms[ei];
    var ex=e.x-cam;if(ex<-60||ex>W+60)continue;
    if(e.dead){
      if(e.dy>0){
        ctx.save();ctx.globalAlpha=e.dy/24;ctx.fillStyle='#ff4444';
        for(var k=0;k<4;k++){var a=k*Math.PI/2+fr*.1,d=24-e.dy;ctx.fillRect(ex+e.w/2+Math.cos(a)*d,e.y+e.h/2+Math.sin(a)*d,4,4);}
        ctx.restore();
      }
      continue;
    }
    var bob=Math.sin(fr*.12+ei)*2;
    ctx.save();ctx.translate(ex+e.w/2,e.y+e.h);
    // ★実画像スプライトがある敵はそれを描画（歩行アニメ＝軽い上下animと傾き）
    if(ESPR_READY[e.type]){
      var im=ESPR[e.type];
      var dh=e.h*1.32, dw=im.width*(dh/im.height);   // 元画像比を保つ。少し大きめに
      var walk=Math.sin(fr*0.15+ei);
      var sq=1+walk*0.025;                           // ぷにぷに上下（控えめに）
      ctx.save();
      ctx.translate(0,bob*0.4);
      if(e.vx>0) ctx.scale(-1,1);                    // 右進行は反転（回転はしない＝ブレ防止）
      ctx.scale(1,sq);
      // 接地影
      ctx.globalAlpha=0.22; ctx.fillStyle='#000';
      ctx.beginPath();ctxEllipse(ctx,0,2,e.w*0.52,4,0,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
      ctx.drawImage(im, -dw/2, -dh+2, dw, dh);
      ctx.restore();
      // ダメージ点滅（被弾直後）
      if(e.hitFlash>0){
        ctx.save();ctx.globalAlpha=Math.min(0.6,e.hitFlash/10);
        ctx.globalCompositeOperation='lighter';ctx.fillStyle='#fff';
        ctx.fillRect(-e.w/2-4,-e.h-4,e.w+8,e.h+8);ctx.restore();
      }
      ctx.restore();
      // HPバー（giantなど複数HP）
      if(e.maxHp>1 && e.hp>0 && e.hp<e.maxHp){
        ctx.save();ctx.translate(ex,e.y);
        ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,-8,e.w,4);
        ctx.fillStyle='#5dff7a';ctx.fillRect(0,-8,e.w*(e.hp/e.maxHp),4);
        ctx.restore();
      }
      continue;
    }
    if(e.type==='giant'||e.type==='boss'){
      // ── ドラゴン（緑の翼竜）/ ボス（巨大）──
      var gw=e.w, gh=e.h;
      var isBossDragon=(e.type==='boss');
      ctx.save();
      var gWing=Math.sin(fr*0.18+ei)*0.5; // 羽ばたき
      var gBreath=(fr%120)<20; // 火を吐くモーション
      var OLd='#0a2a14';
      // 翼（背後・羽ばたき）
      ctx.save();
      ctx.translate(gw*0.1,-gh*0.55+bob);
      ctx.rotate(-0.3+gWing);
      ctx.fillStyle='#1a6a32';ctx.strokeStyle=OLd;ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.quadraticCurveTo(gw*0.5,-gh*0.4,gw*0.85,-gh*0.1);
      ctx.lineTo(gw*0.6,gh*0.05);
      ctx.quadraticCurveTo(gw*0.55,gh*0.2,gw*0.4,gh*0.1);
      ctx.quadraticCurveTo(gw*0.35,gh*0.25,gw*0.2,gh*0.12);
      ctx.closePath();ctx.fill();ctx.stroke();
      ctx.restore();
      // 尻尾
      ctx.fillStyle='#2a8a44';ctx.strokeStyle=OLd;ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(gw*0.3,-gh*0.2+bob);
      ctx.quadraticCurveTo(gw*0.7,-gh*0.1+bob,gw*0.75,gh*0.05+bob);
      ctx.quadraticCurveTo(gw*0.6,-gh*0.05+bob,gw*0.3,-gh*0.1+bob);
      ctx.closePath();ctx.fill();ctx.stroke();
      // ボスはオーラ発光
      if(isBossDragon){ ctx.shadowColor=e.rage?'#cc00ff':'#ff3300'; ctx.shadowBlur=e.rage?26:18; }
      // 胴体（がっしり・グラデ。ボスは赤黒）
      var dg=ctx.createLinearGradient(0,-gh*0.7+bob,0,bob);
      if(isBossDragon){
        if(e.rage){ dg.addColorStop(0,'#8e24aa'); dg.addColorStop(1,'#2a0640'); }
        else { dg.addColorStop(0,'#c0392b'); dg.addColorStop(1,'#6a1010'); }
      }
      else { dg.addColorStop(0,'#3aaa55'); dg.addColorStop(1,'#1e7038'); }
      ctx.fillStyle=dg;ctx.strokeStyle=OLd;ctx.lineWidth=2.4;ctx.lineJoin='round';
